<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orbital Compute Station — Technical Explorer</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #f0e6d3;
    --surface: #faf6f0;
    --surface2: #e8dfd0;
    --surface3: #d8cfc0;
    --border: #c4b8a4;
    --border-dark: #8a7a62;
    --text: #2d2518;
    --muted: #6b5d4a;
    --orbital: #1a8a6a;
    --ground: #c44a3a;
    --accent: #3a7ab8;
    --warning: #d49a22;
    --purple: #7a4ba8;
    --orange: #d4622a;
    --pink: #b84a8a;
    --screen-bg: #1a1a18;
    --screen-glow: #1a8a6a;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: 'IBM Plex Sans', -apple-system, sans-serif; font-size: 13px; line-height: 1.5; height: 100vh; overflow: hidden; }

.app { display: grid; grid-template-columns: 1fr 420px; grid-template-rows: auto 1fr; height: 100vh; }
.top-bar { grid-column: 1 / -1; display: flex; align-items: center; gap: 12px; padding: 8px 16px; background: var(--surface); border-bottom: 1px solid var(--border); }
.top-bar h1 { font-size: 15px; font-weight: 700; color: var(--text); white-space: nowrap; }
.top-bar .subtitle { font-size: 11px; color: var(--muted); margin-left: -4px; }

/* Config tabs */
.config-tabs { display: flex; gap: 2px; margin-left: 16px; }
.config-tab {
    padding: 8px 14px; border-radius: 4px; border: 2px solid var(--border);
    background: var(--surface2); color: var(--text); cursor: pointer; font-size: 11px;
    font-weight: 500; font-family: inherit; transition: all 0.15s;
    text-transform: uppercase; letter-spacing: 0.55px;
}
.config-tab:hover { background: var(--surface2); color: var(--text); }
.config-tab.active { background: var(--orbital); color: #fff; border-color: var(--orbital); }
.config-tab .sub { text-transform: none; letter-spacing: 0; }
.config-tab .sub { font-size: 9px; display: block; opacity: 0.7; }

/* Badge pills */
.badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 600; }
.badge.orbital { background: rgba(26,138,106,0.15); color: var(--orbital); }
.badge.power { background: rgba(212,154,34,0.15); color: var(--warning); }
.badge.compute { background: rgba(58,122,184,0.15); color: var(--accent); }

/* 3D viewport */
.viewport { position: relative; background: var(--screen-bg); border-right: 1px solid var(--border-dark); overflow: hidden; }
.viewport canvas { width: 100%; height: 100%; display: block; }
.viewport-overlay {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, rgba(26,26,24,0.9));
    padding: 12px 16px 10px;
}
.kpi-row { display: flex; gap: 20px; }
.kpi { text-align: center; }
.kpi .val { font-size: 18px; font-weight: 700; color: var(--screen-glow); font-family: 'IBM Plex Mono', monospace; }
.kpi .unit { font-size: 9px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
.viewport-hint { position: absolute; top: 8px; right: 12px; font-size: 10px; color: #555; }
.role-legend { position: absolute; top: 30px; right: 12px; background: rgba(10,14,20,0.85); border: 1px solid rgba(127,219,202,0.3); border-radius: 6px; padding: 6px 10px; font-size: 10px; backdrop-filter: blur(4px); }
.legend-title { color: #7fdbca; font-weight: bold; font-size: 9px; letter-spacing: 1px; margin-bottom: 4px; text-transform: uppercase; }
.legend-item { display: flex; align-items: center; gap: 6px; padding: 2px 0; color: #c8ccd4; }
.legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
.legend-pct { color: #667; font-size: 9px; margin-left: auto; }

/* Right sidebar */
.sidebar { background: var(--surface); overflow-y: auto; display: flex; flex-direction: column; }

/* Sidebar tabs */
.sidebar-tabs { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.sidebar-tab {
    flex: 1; padding: 8px 4px; text-align: center; font-size: 11px; font-weight: 600;
    color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent;
    background: none; border-top: none; border-left: none; border-right: none;
    font-family: inherit; transition: all 0.15s;
}
.sidebar-tab:hover { color: var(--text); background: var(--surface2); }
.sidebar-tab.active { color: var(--orbital); border-bottom-color: var(--orbital); }

/* Tab content panels */
.tab-content { flex: 1; overflow-y: auto; padding: 12px; }
.tab-content:not(.active) { display: none; }
.tab-content.active { display: block; }

/* Cards */
.card {
    background: var(--surface); border: 2px solid var(--border); border-radius: 6px;
    padding: 14px; margin-bottom: 10px;
}
.card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.card-title { font-size: 12px; font-weight: 700; color: var(--text); text-transform: uppercase; letter-spacing: 0.5px; }
.card-badge { font-size: 9px; padding: 1px 6px; border-radius: 3px; font-weight: 600; }

/* Metric rows */
.metric-row { display: flex; justify-content: space-between; padding: 3px 0; border-bottom: 1px solid var(--surface2); }
.metric-row:last-child { border-bottom: none; }
.metric-label { color: var(--muted); font-size: 12px; }
.metric-value { font-weight: 600; font-size: 12px; font-family: 'IBM Plex Mono', monospace; }
.metric-value.orbital { color: var(--orbital); }
.metric-value.warning { color: var(--warning); }
.metric-value.accent { color: var(--accent); }
.metric-value.purple { color: var(--purple); }
.metric-value.ground { color: var(--ground); }
.metric-value.orange { color: var(--orange); }

/* Calc blocks */
.calc-block {
    background: var(--screen-bg); border-radius: 6px; padding: 12px; margin: 8px 0;
    font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; line-height: 1.7;
    color: var(--screen-glow); border: 1px solid #333; white-space: pre-wrap; word-break: break-word;
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.3);
}
.calc-block .comment { color: #556; }
.calc-block .highlight { color: #f0c040; font-weight: 600; }
.calc-block .error { color: #e05555; }
.calc-block .dim { color: #445; }
.calc-block .green { color: #4ecdc4; }
.calc-block .cyan { color: #5cb8e6; }
.calc-block .orange { color: #e8a838; }
.calc-block .pink { color: #e06090; }
.calc-block .white { color: #d0d4dc; font-weight: 600; }

/* Diagram block — darker, wider, for ASCII art and flow diagrams */
.diagram-block {
    background: #0a0c10; border-radius: 6px; padding: 14px 12px; margin: 8px 0;
    font-family: 'IBM Plex Mono', monospace; font-size: 10px; line-height: 1.55;
    color: #778; border: 1px solid #222; white-space: pre; overflow-x: auto;
    box-shadow: inset 0 2px 6px rgba(0,0,0,0.4);
}
.diagram-block .b { color: #5cb8e6; }         /* blue */
.diagram-block .g { color: #4ecdc4; }         /* green */
.diagram-block .o { color: #e8a838; }         /* orange */
.diagram-block .r { color: #e05555; }         /* red */
.diagram-block .p { color: #b080e0; }         /* purple */
.diagram-block .w { color: #d0d4dc; font-weight:600; }  /* white bold */
.diagram-block .y { color: #f0c040; font-weight:600; }  /* yellow highlight */
.diagram-block .d { color: #3a3e48; }         /* dim */
.diagram-block .c { color: #556; font-style: italic; }  /* comment */

/* SVG diagram styling */
.svg-diagram { width: 100%; margin: 8px 0; border-radius: 6px; overflow: hidden; background: #0a0c10; border: 1px solid #222; }
.svg-diagram svg { width: 100%; display: block; }
.svg-diagram text { font-family: 'IBM Plex Mono', 'SF Mono', monospace; }

/* Component chip badges inline */
.chip { display:inline-block; padding:1px 6px; border-radius:3px; font-size:9px; font-weight:600; margin:0 2px; vertical-align:middle; }
.chip-blue { background:rgba(58,122,184,0.2); color:#5cb8e6; }
.chip-green { background:rgba(78,205,196,0.15); color:#4ecdc4; }
.chip-orange { background:rgba(232,168,56,0.15); color:#e8a838; }
.chip-red { background:rgba(224,85,85,0.15); color:#e05555; }
.chip-purple { background:rgba(176,128,224,0.15); color:#b080e0; }

/* Custom model form inputs */
.model-form { background: var(--surface2); border-radius: 6px; padding: 10px; margin: 8px 0; }
.model-form label { display: block; font-size: 10px; color: var(--muted); margin-bottom: 2px; margin-top: 6px; }
.model-form label:first-child { margin-top: 0; }
.model-form input[type="number"], .model-form select {
    width: 100%; box-sizing: border-box; padding: 4px 6px; border-radius: 4px;
    border: 1px solid #444; background: var(--screen-bg); color: var(--screen-glow);
    font-family: 'IBM Plex Mono', monospace; font-size: 11px;
}
.model-form input[type="number"]:focus, .model-form select:focus {
    outline: none; border-color: var(--accent); box-shadow: 0 0 4px rgba(58,122,184,0.3);
}
.model-form .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.model-form .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.model-form .analyze-btn {
    margin-top: 8px; width: 100%; padding: 6px; border-radius: 4px; border: none;
    background: var(--accent); color: white; font-weight: 600; font-size: 11px; cursor: pointer;
}
.model-form .analyze-btn:hover { background: #4a9ad4; }
.model-form .preset-row { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px; align-items: center; }
.model-form .preset-btn {
    padding: 2px 6px; border-radius: 3px; border: 1px solid #444; background: transparent;
    color: var(--muted); font-size: 9px; cursor: pointer; font-family: 'IBM Plex Mono', monospace;
    width: auto; margin: 0;
}
.model-form .preset-btn:hover { border-color: var(--accent); color: var(--accent); }
.custom-results { margin-top: 8px; }

/* Material tags */
.mat-list { margin: 6px 0; }
.mat-item { display: flex; gap: 6px; padding: 4px 0; border-bottom: 1px solid var(--surface2); font-size: 11px; }
.mat-item:last-child { border-bottom: none; }
.mat-name { font-weight: 600; color: var(--text); flex: 1; }
.mat-supplier { color: var(--accent); font-size: 10px; }
.mat-detail { color: var(--muted); font-size: 10px; }

/* Model serving table */
.model-table { width: 100%; border-collapse: collapse; font-size: 11px; margin: 6px 0; }
.model-table th { text-align: left; padding: 4px 6px; border-bottom: 2px solid var(--border); font-weight: 700; color: var(--muted); font-size: 10px; text-transform: uppercase; }
.model-table td { padding: 4px 6px; border-bottom: 1px solid var(--surface2); }
.model-table td.mono { font-family: 'IBM Plex Mono', monospace; }

/* Progress bars */
.progress-bar { height: 6px; background: var(--surface2); border-radius: 3px; margin: 4px 0; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }

/* Section headers */
.section-header { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; padding: 8px 0 4px; margin-top: 4px; }

/* Info panel (3D click) */
.info-panel {
    position: absolute; left: 16px; top: 16px; width: 320px;
    background: rgba(26,26,24,0.95); border: 1px solid #444; border-radius: 8px;
    padding: 16px; display: none; z-index: 20; max-height: calc(100% - 32px); overflow-y: auto;
    color: #ddd; backdrop-filter: blur(12px);
}
.info-panel h2 { font-size: 14px; color: var(--screen-glow); margin-bottom: 6px; }
.info-panel h3 { font-size: 11px; color: #888; margin: 10px 0 4px; text-transform: uppercase; letter-spacing: 1px; }
.info-panel .close-btn { position: absolute; top: 8px; right: 12px; cursor: pointer; color: #666; font-size: 18px; background: none; border: none; }
.info-panel .close-btn:hover { color: #fff; }
.info-panel .mat-name { color: #ddd; }
.info-panel .mat-supplier { color: #6db; }
.info-panel .mat-detail { color: #888; }
.info-panel .metric-row { border-color: #333; }
.info-panel .metric-label { color: #888; }
.info-panel .metric-value { color: #ddd; }

/* Scrollbar styling */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-dark); }

/* Responsive */
@media (max-width: 900px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { max-height: 40vh; }
}
</style>
</head>

    <!-- Right sidebar with tabs -->
    <div class="sidebar">

        <div class="tab-content active" id="tab-overview"></div>
        <div class="tab-content" id="tab-compute"></div>
        <div class="tab-content" id="tab-network"></div>
        <div class="tab-content" id="tab-models"></div>
        <div class="tab-content" id="tab-physics"></div>
        <div class="tab-content" id="tab-cluster"></div>
    </div>
</div>

// COMPUTE DERIVED METRICS
// =====================================================================
function computeMetrics(cfg) {
    const m = {};
    // Power
    const solarEff = cfg.solarCellEff || 0.20;
    const solarGen = cfg.solarM2 * 1361 * solarEff;
    m.solarGenW = solarGen;
    m.pmadOut = solarGen * 0.90;
    m.powerMargin = m.pmadOut / (cfg.busPwr * 1000);

    // Thermal — proper per-face radiative equilibrium
    // Each radiator face sees a different thermal environment:
    //   Face A (deep-space side): radiates to 3K background, absorbs Earth IR at view factor F_A
    //   Face B (Earth/sun side): radiates to 3K + Earth, absorbs Earth IR at view factor F_B
    // Net flux per face = εσT_rad⁴ - α_IR·q_Earth·VF_face
    //   where q_Earth ≈ 237 W/m² (Earth OLR at 625km) and α_IR ≈ ε (Kirchhoff)
    const sigma = 5.67e-8;
    const eps = 0.95;        // Carbon black emissivity
    const alphaIR = 0.95;    // Carbon black IR absorptivity (Kirchhoff: α ≈ ε)
    const alphaSolar = 0.95; // Carbon black solar absorptivity (high — absorbs sunlight)
    const qEarth = 237;      // Earth OLR at 625 km, W/m²
    const qEmit = sigma * eps * Math.pow(cfg.radTempK, 4);  // emitted per face
    m.qEmitPerFace = qEmit;

    // Radiator net flux — carbon black coating
    //
    // Carbon black: ε≈0.95, α_solar≈0.95, α_IR≈0.95
    // High solar absorptivity means the radiator absorbs more solar input than AZ-93 (α=0.15).
    // Trade: slightly better IR emissivity uniformity, but worse solar rejection.
    //
    // Physics breakdown at 370K, 625 km dawn-dusk SSO:
    //   εσT⁴ = 0.95 × 5.67e-8 × 370⁴ ≈ 1010 W/m² per face (emission)
    //
    //   Face A (zenith/deep-space):
    //     Sees mostly 4K background, small Earth limb (VF ≈ 0.08)
    //     Absorbed IR: 0.95 × 237 × 0.08 ≈ 18 W/m²
    //     Net: 1010 - 18 = ~992 W/m²
    //
    //   Face B (nadir/Earth-facing):
    //     35% of hemisphere sees 255K Earth (VF = 0.35)
    //     Earth OLR absorbed: 0.95 × 237 × 0.35 ≈ 79 W/m²
    //     Solar albedo reflected from Earth: α_s × 55 = 0.95 × 55 ≈ 52 W/m²
    //     Direct solar leak (non-ideal edge-on): α_s × 40 = 0.95 × 40 ≈ 38 W/m²
    //     Corrected net face B: ~500 W/m² (from detailed thermal model)
    //
    //   Bifacial total: 992 + 500 = 1492 W/m² (ideal)
    //   System derating (18%): coating degradation, thermal cycling, MMOD, solar transients
    //   Carbon black degrades faster in UV than white paint → larger EOL derating
    //   Net effective: 1492 × 0.82 ≈ ~620 W/m²
    //
    const vfDeepSpace = 0.08;
    const vfEarthSide = 0.35;

    const qNetA = qEmit - alphaIR * qEarth * vfDeepSpace;

    // Face B: detailed model — Earth fills 35% of view, raising effective sink temp
    // σ × (T_rad⁴ - T_earth⁴ × VF_earth) on the nadir face
    const T_earth = 255;  // effective Earth temperature
    const qNetB_emission = eps * sigma * (Math.pow(cfg.radTempK, 4) - Math.pow(T_earth, 4) * vfEarthSide);
    // Plus solar albedo and direct solar leak
    const qAlbedoIncident = 55;   // W/m² solar albedo reflected off Earth (incident)
    const qSolarLeakIncident = 40; // W/m² direct solar on non-ideal edge-on panel (incident)
    // Carbon black absorbs solar at α_solar = 0.95 (vs AZ-93 white at 0.15)
    const qAlbedo = alphaSolar * qAlbedoIncident;
    const qSolarLeak = alphaSolar * qSolarLeakIncident;
    const qNetB = qNetB_emission - qAlbedo - qSolarLeak;

    // System-level derating: 18% for carbon black (degrades faster under UV than white paint)
    // EOL coating degradation, thermal cycling, MMOD, solar transients
    const systemDerating = 0.82;

    m.qNetA = qNetA;
    m.qNetB = Math.max(0, qNetB);  // floor at 0 — face B can't be negative
    m.qNet = (qNetA + m.qNetB) * systemDerating;
    m.derivedSidedness = m.qNet / qEmit;
    m.qFace = qEmit;
    m.systemDerating = systemDerating;

    m.reqRadM2 = cfg.thermalKw * 1000 / m.qNet;
    m.thermalMargin = cfg.radM2 / m.reqRadM2;

    // Compute — use gpuCount if specified (from spreadsheet), else derive from power
    m.oruCount = cfg.gpuCount || Math.floor(cfg.computeKw * 1000 / cfg.gpuPowerW);
    const computeWatts = cfg.computeKw * 1000;
    const rawGFLOPS = computeWatts * cfg.gpuGFLOPS_W;
    m.rawTFLOPS = rawGFLOPS / 1000;
    m.effectiveTFLOPS = m.rawTFLOPS * cfg.radHardening;
    m.totalMemTB = (m.oruCount * cfg.gpuMemGB) / 1024;

    // Networking
    m.islBandwidthGbps = cfg.islCount * cfg.islRateGbps;
    m.groundBandwidthGbps = cfg.groundLinkGbps * cfg.groundStations;
    m.effectiveGroundGbps = m.groundBandwidthGbps * cfg.contactFraction;

    // Model serving (tokens/sec)
    // Simplified: ~2 FLOPS per parameter per token (inference)
    // Plus memory bandwidth bottleneck
    const models = getModelServing(cfg, m);
    m.models = models;

    // Latency
    m.orbitalLatencyMs = (cfg.altitude * 2 * 1000) / 3e8 * 1000; // round-trip light
    m.totalLatencyMs = m.orbitalLatencyMs + 5; // + processing

    // Mass budget — use spreadsheet values when available, fallback to estimates
    m.pvMassKg = cfg.massSolar || cfg.solarM2 * 1.5;
    m.radMassKg = cfg.massRadiator || cfg.radM2 * 3.0;
    m.computeMassKg = cfg.massCompute || m.oruCount * (cfg.gpuPowerW > 500 ? 8 : 3);
    m.structMassKg = cfg.massStructure || ((cfg.spineLen || 2) * 3 + 50);
    m.cryoMassKg = cfg.massCryo || 0;
    m.totalMassKg = cfg.dryMassKg || (m.pvMassKg + m.radMassKg + m.computeMassKg + m.cryoMassKg + m.structMassKg + 200);
    const costPerKg = cfg.launchCostPerKg || 1500;
    m.launchCostM = m.totalMassKg * costPerKg / 1e6;
    m.launchCostPerKg = costPerKg;
    m.launchVehicle = cfg.launchVehicle || 'Falcon 9';

    // LCOC derivation from corrected inputs
    // GPU-hours = gpuCount × satLife_years × 8760 hr/yr × utilization
    const utilization = 0.85;  // 85% compute utilization (thermal throttling, maintenance, reboost)
    m.totalGpuHours = m.oruCount * (cfg.satLife || 5) * 8760 * utilization;
    m.totalProgramCost = cfg.totalProgramCost || (m.totalMassKg * costPerKg + m.oruCount * 5000);  // fallback: launch + GPU procurement
    m.lcocGross = m.totalProgramCost / m.totalGpuHours;
    // Net LCOC: accounts for contact fraction (can only serve during ground contact for real-time)
    // Store-and-forward workloads can use 100% of compute time
    const servingFraction = cfg.storeAndForward ? 1.0 : (cfg.contactFraction || 0.35);
    m.lcocNet = m.lcocGross / servingFraction;
    // Note: Net > Gross because you pay for 100% of GPU-hours but can only serve during contact

    // Structural — scaled longerons per config, coupled-mode for DP3
    const pvSpan = Math.sqrt(cfg.solarM2 / 2 / 1.5) * 1.5;
    const L = pvSpan / 2;
    m.pvHalfSpan = L;

    // Longeron sizing scales with span and platform mass
    // DP1/T1: 40×40mm (light, short span)
    // DP2: 60×60mm (medium)
    // DP3: 100×100mm (heavy, long span, thick walls)
    const longeronMM = cfg.isDP3 ? 100 : (cfg.isDP1 ? 40 : 60);
    const wallMM = cfg.isDP3 ? 5 : 3;  // wall thickness
    const longeronM = longeronMM / 1000;
    const wallM = wallMM / 1000;
    m.longeronMM = longeronMM;
    m.longeronWallMM = wallMM;

    // CFRP properties
    const E_cfrp = 150e9;  // Pa (T800 unidirectional)
    const rho_cfrp = 1600; // kg/m³
    // Square hollow section: I = (a⁴ - b⁴)/12 where a=outer, b=inner
    const a = longeronM, b = longeronM - 2 * wallM;
    const I_long = (Math.pow(a, 4) - Math.pow(b, 4)) / 12;
    const A_long = a * a - b * b;  // cross-section area
    m.I_longeron = I_long;
    m.A_longeron = A_long;

    // PV wing first mode (cantilever from hub/spine)
    m.f1_pv = (1.875*1.875 / (2*Math.PI)) * Math.sqrt(E_cfrp * I_long / (rho_cfrp * A_long * Math.pow(L, 4)));
    m.f1 = m.f1_pv;  // backwards compat

    if (cfg.isDP3 && cfg.spineLen > 0) {
        // DP3 coupled-mode analysis: spine is a free-free beam with cantilevered appendages
        // The spine carries all mass (PV wings + radiator + cryo + compute)
        // Model as Dunkerley's method: 1/f² ≈ 1/f_spine² + 1/f_pv² + 1/f_rad²
        const spineL = cfg.spineLen;
        const spineW = 0.5;  // spine cross-section (500mm per FeatureScript)
        const spineWall = 0.01; // 10mm wall
        const I_spine = (Math.pow(spineW, 4) - Math.pow(spineW - 2*spineWall, 4)) / 12;
        const A_spine = spineW*spineW - (spineW-2*spineWall)*(spineW-2*spineWall);

        // Spine lateral bending (free-free beam, 1st mode)
        // f = (4.730²/2π)√(EI/mL⁴) where m = ρA + distributed mass
        const spineMassPerM = rho_cfrp * A_spine + m.totalMassKg / spineL;  // structural + payload
        m.f1_spine = (4.730*4.730 / (2*Math.PI)) * Math.sqrt(E_cfrp * I_spine / (spineMassPerM * Math.pow(spineL, 4)));

        // X-bracing adds ~2-3x torsional stiffness; model as 2x EI_eff for torsion
        m.f1_torsion = m.f1_spine * 1.8;  // braced spine torsional mode

        // Dunkerley lower bound for coupled system
        m.f1_coupled = 1.0 / Math.sqrt(1/(m.f1_spine*m.f1_spine) + 1/(m.f1_pv*m.f1_pv));

        // Radiator panel bending (if large flat panel)
        const radPanelSpan = Math.sqrt(cfg.radM2 * 2.5);
        m.f1_radPanel = (1.875*1.875 / (2*Math.PI)) * Math.sqrt(E_cfrp * I_long / (rho_cfrp * A_long * Math.pow(radPanelSpan/2, 4)));

        // Overall system first mode
        m.f1 = m.f1_coupled;
        m.f1_note = 'Dunkerley coupled (spine + PV wing)';
    } else {
        m.f1_note = 'Cantilever beam (PV wing)';
    }

    return m;
}

function getModelServing(cfg, m) {
    // Models with param count and serving requirements
    // Estimates based on public leaks, inference analysis, and architecture patterns
    const modelDefs = [
        // Open-weight models (known architectures)
        { name: "Llama 3.3 70B", params: 70e9, minMemGB: 35, type: "dense",
          notes: "80L, d=8192, 64 heads. Meta open-weight." },
        { name: "Llama 3.1 405B", params: 405e9, minMemGB: 203, type: "dense",
          notes: "126L, d=16384, 128 heads. Largest open dense model." },
        { name: "DeepSeek V3 671B", params: 671e9, minMemGB: 336, type: "moe", activeParams: 37e9,
          notes: "61L, 256 experts, 8 active. Multi-head latent attention. FP8 training." },
        { name: "Mixtral 8×22B", params: 176e9, minMemGB: 88, type: "moe", activeParams: 44e9,
          notes: "56L, 8 experts, 2 active per token." },

        // Frontier closed models (estimated architectures)
        { name: "Claude Sonnet 4.5", params: 175e9, minMemGB: 88, type: "dense",
          notes: "Est. ~175B dense. Optimized for speed. Likely 96L, d=12288." },
        { name: "Claude Opus 4.6", params: 550e9, minMemGB: 275, type: "moe", activeParams: 100e9,
          notes: "Est. ~550B MoE, ~100B active. Deep reasoning, extended thinking. 128L, d=16384." },
        { name: "GPT-4o", params: 250e9, minMemGB: 125, type: "moe", activeParams: 60e9,
          notes: "Est. ~250B MoE, 60B active. Multimodal (text+vision+audio)." },
        { name: "GPT-5 class", params: 3500e9, minMemGB: 1750, type: "moe", activeParams: 400e9,
          notes: "Est. ~3.5T MoE. Next-gen reasoning. Likely 160L, 64 experts." },
        { name: "Gemini 2.5 Pro", params: 1400e9, minMemGB: 700, type: "moe", activeParams: 200e9,
          notes: "Est. ~1.4T MoE, 200B active. 1M token context. Deep thinking." },
        { name: "Gemini Ultra 2.0", params: 2200e9, minMemGB: 1100, type: "moe", activeParams: 350e9,
          notes: "Est. ~2.2T MoE. Multimodal flagship. 128 experts, 4 active." },
    ];

    return modelDefs.map(model => {
        const activeP = model.activeParams || model.params;
        const fitsInMem = m.totalMemTB * 1024 >= model.minMemGB;

        // PREFILL: compute-bound. tok/s = TFLOPS / (2 * activeParams)
        // This is the throughput for parallel prompt processing
        const prefillTokSec = fitsInMem ? (m.effectiveTFLOPS * 1e12) / (2 * activeP) : 0;

        // DECODE: memory-bandwidth-bound. Each token reads all active params once.
        // tok/s = totalMemBW_bytes_per_sec / (activeParams * bytesPerParam)
        // This is the autoregressive generation speed (the real user-facing throughput)
        const bytesPerParam = 2; // FP16
        const totalMemBwBps = m.oruCount * cfg.gpuMemBwTBs * 1e12;
        const decodeTokSec = fitsInMem ? totalMemBwBps / (activeP * bytesPerParam) : 0;

        // Batch decode: can overlap multiple streams (up to compute saturation)
        const batchSize = Math.min(cfg.batchSize || 8, 32);
        const batchDecodeTokSec = decodeTokSec * batchSize;

        // Ground bandwidth constraint: ~2 bytes per output token
        const bwLimitTokSec = (m.effectiveGroundGbps * 1e9 / 8) / 2;
        const effectiveTokSec = Math.min(batchDecodeTokSec, bwLimitTokSec);

        return {
            ...model,
            fits: fitsInMem,
            prefillTokSec: Math.floor(prefillTokSec),
            decodeTokSec: Math.floor(decodeTokSec),
            rawTokSec: Math.floor(decodeTokSec),  // legacy: decode is the "raw" single-stream rate
            batchTokSec: Math.floor(batchDecodeTokSec),
            effectiveTokSec: Math.floor(effectiveTokSec),
            bwLimited: batchDecodeTokSec > bwLimitTokSec,
        };

window.customModelState = null; // persists across tab re-renders

window.applyCustomModel = function() {
    const get = id => parseFloat(document.getElementById(id)?.value) || 0;
    const paramsB = get('cm-params');
    const nLayers = get('cm-layers') || Math.round(paramsB * 0.8); // rough heuristic
    const hiddenDim = get('cm-hidden') || Math.round(Math.sqrt(paramsB * 1e9 / nLayers / 12));
    const nHeads = get('cm-heads') || Math.round(hiddenDim / 128);
    const headDim = Math.round(hiddenDim / nHeads);
    const ctxLen = get('cm-ctx') || 4096;
    const quant = document.getElementById('cm-quant')?.value || 'fp16';
    const isMoE = document.getElementById('cm-moe')?.checked || false;
    const numExperts = isMoE ? (get('cm-experts') || 8) : 1;
    const activeExperts = isMoE ? (get('cm-active') || 2) : 1;
    const batchSz = get('cm-batch') || 8;

    window.customModelState = {
        paramsB, nLayers, hiddenDim, nHeads, headDim, ctxLen, quant,
        isMoE, numExperts, activeExperts, batchSz
    };

    // Re-render the models tab
    const cfg = CONFIGS[currentConfig.replace('_CLUSTER','').replace('_DRAGONFLY','')] || CONFIGS.DP2;
    const m = computeMetrics(cfg);
    document.getElementById('tab-models').innerHTML = renderModels(cfg, m);
    // Scroll to results
    setTimeout(() => {
        const el = document.getElementById('custom-results');
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 50);
};

function analyzeCustomModel(cfg, m) {
    const s = window.customModelState;
    if (!s) return '';

    const cs = cfg.clusterSize || 1;
    const totalMemGB = m.totalMemTB * 1024 * cs;
    const totalMemBwBytesPerS = m.oruCount * cs * cfg.gpuMemBwTBs * 1e12;
    const clusterTFLOPS = m.effectiveTFLOPS * cs;

    // Quantization bytes per param
    const quantBytes = { fp32: 4, fp16: 2, bf16: 2, int8: 1, fp8: 1, int4: 0.5, fp4: 0.5 };
    const bpp = quantBytes[s.quant] || 2;
    const quantLabel = s.quant.toUpperCase();

    // Total params and active params
    const totalParams = s.paramsB * 1e9;
    const activeParams = s.isMoE ? totalParams * (s.activeExperts / s.numExperts) : totalParams;
    const activeParamsB = activeParams / 1e9;

    // Weight memory
    const weightMemGB = totalParams * bpp / 1e9;

    // KV cache per token: 2 * nLayers * 2 * headDim * nHeads * bpp (K and V)
    // Actually KV is usually kept in FP16 regardless of weight quantization
    const kvBytesPerToken = 2 * s.nLayers * 2 * s.headDim * s.nHeads * 2; // FP16 KV
    const kvPerRequestGB = (kvBytesPerToken * s.ctxLen) / 1e9;

    // Does it fit?
    const fitsWeights = weightMemGB < totalMemGB;
    const kvBudgetGB = (totalMemGB - weightMemGB) * 0.8; // 80% of remaining for KV
    const maxConcurrent = kvBudgetGB > 0 ? Math.floor(kvBudgetGB / kvPerRequestGB) : 0;
    const fitsBatch = maxConcurrent >= 1;

    // Prefill: compute-bound
    const prefillFLOPs = 2 * activeParams * s.ctxLen;
    const prefillTimeMs = (prefillFLOPs / (clusterTFLOPS * 1e12)) * 1000;

    // Decode: memory-BW-bound (reads all active weights per token)
    const decodeReadBytes = activeParams * bpp;
    const decodeTimeMs = (decodeReadBytes / totalMemBwBytesPerS) * 1000;
    const decodeTPS = 1000 / decodeTimeMs;

    // Batch throughput
    const batchTPS = decodeTPS * Math.min(s.batchSz, maxConcurrent);
    const bwLimitTPS = (m.effectiveGroundGbps * cs * 1e9 / 8) / 2;
    const effTPS = Math.min(batchTPS, bwLimitTPS);

    // TTFT
    const rttMs = m.totalLatencyMs;
    const ttftMs = rttMs + prefillTimeMs;

    // Training
    const trainBPP = 16; // Adam mixed precision
    const trainMemGB = totalParams * trainBPP / 1e9;
    const loraMem = weightMemGB + (totalParams * 0.01 * trainBPP / 1e9);
    const rlhfMem = trainMemGB * 2.5;
    // Training throughput: 6N FLOPs per token × MFU (orbital MFU lower due to radiation + thermal)
    const trainMFU = cfg.isDP3 ? 0.35 : 0.25;  // 25-35% MFU for orbital (vs 40-65% ground)
    const trainTokPerS = (clusterTFLOPS * trainMFU * 1e12) / (6 * activeParams);
    const finetuneHours = 1e9 / trainTokPerS / 3600;

    // $/M tokens
    const costPerHr = m.lcocNet || cfg.lcocNet || (cfg.busPwr * 1500 / 3600);
    const costPerMTok = effTPS > 0 ? costPerHr / (effTPS * 3.6) : Infinity;

    // Nodes needed if doesn't fit
    const nodesNeeded = Math.ceil(weightMemGB / (m.totalMemTB * 1024));

    return `
    <div class="card" id="custom-results">
        <div class="card-header">
            <span class="card-title">Custom Model Analysis</span>
            <span class="card-badge" style="background:rgba(240,192,64,0.2);color:#f0c040">${s.paramsB}B ${s.isMoE ? 'MoE('+s.numExperts+'×'+s.activeExperts+')' : 'Dense'} · ${quantLabel}</span>
        </div>

        <div class="section-header">Memory Fit</div>
        <div class="metric-row"><span class="metric-label">Weight memory (${quantLabel})</span><span class="metric-value ${fitsWeights ? 'orbital' : 'ground'}">${weightMemGB.toFixed(1)} GB ${fitsWeights ? '✓' : '✗ OOM'}</span></div>
        <div class="metric-row"><span class="metric-label">Available (${cs > 1 ? cs+' nodes' : 'single'})</span><span class="metric-value">${totalMemGB.toFixed(0)} GB</span></div>
        ${!fitsWeights ? `<div class="metric-row"><span class="metric-label">Nodes needed</span><span class="metric-value warning">${nodesNeeded} × ${cfg.shortName}</span></div>` : ''}
        ${fitsWeights ? `
        <div class="metric-row"><span class="metric-label">KV per token</span><span class="metric-value">${(kvBytesPerToken/1024).toFixed(1)} KB</span></div>
        <div class="metric-row"><span class="metric-label">KV per request (${(s.ctxLen/1024).toFixed(0)}K ctx)</span><span class="metric-value">${kvPerRequestGB.toFixed(2)} GB</span></div>
        <div class="metric-row"><span class="metric-label">Max concurrent</span><span class="metric-value accent">${maxConcurrent} requests</span></div>
        ` : ''}
    </div>

    ${fitsWeights ? `
    <div class="card">
        <div class="card-header"><span class="card-title">Inference Performance</span></div>
        <div class="calc-block"><span class="comment">// Prefill (compute-bound)</span>
FLOPs = 2 × ${activeParamsB.toFixed(0)}B × ${(s.ctxLen/1024).toFixed(0)}K = <span class="highlight">${(prefillFLOPs/1e12).toFixed(1)} TFLOP</span>
Time = ${(prefillFLOPs/1e12).toFixed(1)} / ${clusterTFLOPS.toFixed(0)} TFLOPS = <span class="highlight">${prefillTimeMs < 1000 ? prefillTimeMs.toFixed(1)+' ms' : (prefillTimeMs/1000).toFixed(2)+' s'}</span>

<span class="comment">// Decode (memory-BW-bound)</span>
Read per token: ${activeParamsB.toFixed(0)}B × ${bpp}B = <span class="cyan">${(decodeReadBytes/1e9).toFixed(1)} GB</span>
Mem bandwidth: <span class="cyan">${(totalMemBwBytesPerS/1e12).toFixed(1)} TB/s</span>
Time/token: <span class="highlight">${decodeTimeMs.toFixed(2)} ms</span> → <span class="highlight">${decodeTPS.toFixed(0)} tok/s</span>

<span class="comment">// Batched throughput</span>
Batch size: ${Math.min(s.batchSz, maxConcurrent)} (limited by ${s.batchSz <= maxConcurrent ? 'config' : 'KV budget'})
Batch TPS: <span class="highlight">${batchTPS.toFixed(0)} tok/s</span>
BW ceiling: ${bwLimitTPS.toFixed(0)} tok/s
Effective: <span class="highlight">${effTPS.toFixed(0)} tok/s</span> ${batchTPS > bwLimitTPS ? '<span class="error">(BW limited!)</span>' : ''}</div>

        <div class="section-header">Latency</div>
        <div class="metric-row"><span class="metric-label">TTFT</span><span class="metric-value ${ttftMs < 2000 ? 'orbital' : ttftMs < 10000 ? 'warning' : 'ground'}">${ttftMs < 1000 ? ttftMs.toFixed(0)+' ms' : (ttftMs/1000).toFixed(2)+' s'}</span></div>
        <div class="metric-row"><span class="metric-label">Decode TPS (1 stream)</span><span class="metric-value accent">${decodeTPS.toFixed(0)} tok/s</span></div>
        <div class="metric-row"><span class="metric-label">Inter-token latency</span><span class="metric-value">${decodeTimeMs.toFixed(2)} ms</span></div>
        <div class="metric-row"><span class="metric-label">$/M tokens</span><span class="metric-value ${costPerMTok < 5 ? 'orbital' : costPerMTok < 50 ? 'warning' : 'ground'}">$${costPerMTok >= 1000 ? '∞' : costPerMTok < 0.01 ? '<0.01' : costPerMTok.toFixed(2)}</span></div>
        <div class="metric-row"><span class="metric-label">Bottleneck</span><span class="metric-value">${batchTPS > bwLimitTPS ? 'Ground bandwidth' : 'Memory bandwidth (decode)'}</span></div>
    </div>

    <div class="card">
        <div class="card-header"><span class="card-title">Training Feasibility</span></div>
        <div class="metric-row"><span class="metric-label">Full fine-tune (Adam)</span><span class="metric-value ${trainMemGB < totalMemGB ? 'orbital' : 'ground'}">${trainMemGB.toFixed(0)} GB ${trainMemGB < totalMemGB ? '✓' : '✗ need '+Math.ceil(trainMemGB/(m.totalMemTB*1024))+' nodes'}</span></div>
        <div class="metric-row"><span class="metric-label">LoRA (r=16, 1%)</span><span class="metric-value ${loraMem < totalMemGB ? 'orbital' : 'ground'}">${loraMem.toFixed(0)} GB ${loraMem < totalMemGB ? '✓' : '✗'}</span></div>
        <div class="metric-row"><span class="metric-label">RLHF (PPO)</span><span class="metric-value ${rlhfMem < totalMemGB ? 'orbital' : 'ground'}">${rlhfMem.toFixed(0)} GB ${rlhfMem < totalMemGB ? '✓' : '✗ need '+Math.ceil(rlhfMem/(m.totalMemTB*1024))+' nodes'}</span></div>
        <div class="metric-row"><span class="metric-label">Training tok/s</span><span class="metric-value">${trainTokPerS.toFixed(0)}</span></div>
        <div class="metric-row"><span class="metric-label">1B-token epoch</span><span class="metric-value ${finetuneHours < 168 ? 'orbital' : 'warning'}">${finetuneHours < 1/60 ? (finetuneHours*3600).toFixed(0)+' sec' : finetuneHours < 1 ? (finetuneHours*60).toFixed(1)+' min' : finetuneHours < 24 ? finetuneHours.toFixed(1)+' hours' : (finetuneHours/24).toFixed(1)+' days'}</span></div>
    </div>
    ` : `
    <div class="card">
        <div class="card-header"><span class="card-title">Scaling Path</span></div>

<span class="comment">// Or use lower quantization:</span>

FP4:   ${(totalParams * 0.5 / 1e9).toFixed(0)} GB ${(totalParams * 0.5 / 1e9) < totalMemGB ? '<span class="highlight">✓ FITS</span>' : '<span class="error">✗ need '+Math.ceil(totalParams * 0.5 / 1e9 / (m.totalMemTB*1024))+' nodes</span>'}

function renderModels(cfg, m) {
    // ====== PARAMETER SIZING ======
    const totalMemGB = m.totalMemTB * 1024;
    const cs = cfg.clusterSize || 1;
    const clusterMemGB = totalMemGB * cs;
    // Max params at various quantizations (weights only, no KV cache overhead)
    const maxFP16 = clusterMemGB / 2;         // 2 bytes/param
    const maxINT8 = clusterMemGB / 1;          // 1 byte/param
    const maxFP4 = clusterMemGB / 0.5;         // 0.5 bytes/param

    // KV cache sizing: per token per layer = 2 * nHeads * headDim * 2bytes(FP16)
    // Assume transformer: ~128 layers for large model, 128 heads, head_dim=128
    // KV per token ≈ 2 * nLayers * 2 * hiddenDim * 2 bytes
    // Rough: ~0.5 MB per token per 100B params
    const kvBytesPerTokenPer100B = 0.5e6; // bytes

    let tableRows = m.models.map(mod => {
        const statusColor = !mod.fits ? 'ground' : mod.bwLimited ? 'warning' : 'orbital';
        const status = !mod.fits ? '✗ OOM' : mod.bwLimited ? '⚠ BW' : '✓ OK';
        return `<tr>
            <td><b>${mod.name}</b>${mod.type === 'moe' ? ' <span style="font-size:9px;color:var(--muted)">(MoE)</span>' : ''}</td>
            <td class="mono">${(mod.params/1e9).toFixed(0)}B</td>
            <td class="mono">${mod.minMemGB} GB</td>
            <td class="mono">${mod.fits ? mod.decodeTokSec.toLocaleString() : '—'}</td>
            <td class="mono">${mod.fits ? mod.effectiveTokSec.toLocaleString() : '—'}</td>
            <td><span class="metric-value ${statusColor}">${status}</span></td>
        </tr>`;
    }).join('');

    // ====== INFERENCE PIPELINE MATH ======
    // Pick first fitting model for detailed analysis
    const refModel = m.models.find(mod => mod.fits) || m.models[0];
    const refParams = refModel ? (refModel.activeParams || refModel.params) : 70e9;
    const refName = refModel ? refModel.name : 'N/A';
    const refParamsB = refParams / 1e9;

    // Prefill: compute-bound. FLOPs = 2 * P * S (forward pass)
    const seqLen = cfg.seqLen || 2048;
    const prefillFLOPs = 2 * refParams * seqLen;

    const decodeTokPerS = decodeTimePerTokenMs > 0 ? 1000 / decodeTimePerTokenMs : 0;

    const kvPerTokenBytes = kvBytesPerTokenPer100B * (refParams / 100e9);
    const kvPerRequestGB = (kvPerTokenBytes * seqLen) / 1e9;
    const kvBudgetGB = clusterMemGB * 0.3; // 30% of memory for KV cache

    const batchSize = Math.min(cfg.batchSize || 8, Math.floor(maxConcurrentRequests));

    // FP16 mixed precision: weights(2B) + master(4B) + grad(2B) + momentum(4B) + variance(4B) = 16B/param
    const trainBytesPerParam = 16;

    const maxTrainParamsB = maxTrainParams / 1e9;

    const loraFits = loraMemGB < clusterMemGB;

    // Approx 4x single model memory
    const rlhfMemGB = refParams * trainBytesPerParam / 1e9 * 2.5; // policy(train) + ref(infer) + reward(infer)
    const rlhfFits = rlhfMemGB < clusterMemGB;

    // Orbital MFU is MUCH lower than ground:
    //   Ground (H100 cluster): 40-55% MFU
    //   Orbital single node: ~15-25% (radiation ECC, thermal throttling, no optimized collectives)
    //   Orbital cluster: ~10-20% (add ISL latency for all-reduce, gradient sync overhead)
    const trainMFU = cs > 1 ? (cfg.isDP3 ? 0.18 : 0.15) : (cfg.isDP3 ? 0.25 : 0.20);
    const trainFLOPsPerToken = 6 * refParams;
    const trainTokPerSec = (m.effectiveTFLOPS * cs * trainMFU * 1e12) / trainFLOPsPerToken;

    // Time to fine-tune: assume 1 epoch over 1B tokens

    const finetuneHours = finetuneTokens / trainTokPerSec / 3600;

}

function renderCluster(cfg, m) {
    const cs = cfg.clusterSize || 1;
    const maxCs = cfg.maxClusterSize || cs;
    const roles = cfg.clusterRoles || ['inference'];
    const tp = cfg.tensorParallel || 1;
    const pp = cfg.pipelineParallel || 1;
    const topology = cfg.clusterTopology || 'standalone';

    // Cluster-level compute
    const clusterTFLOPS = m.effectiveTFLOPS * cs;
    const clusterMemTB = m.totalMemTB * cs;
    const clusterISLBw = m.islBandwidthGbps;

    // Communication overhead estimate
    const allReduceBytes = m.totalMemTB * 1024 * 1e9 * 0.01;
    const allReduceTimeMs = cs > 1 ? (allReduceBytes * 8 / (clusterISLBw * 1e9) * 1000 * 2 * Math.log2(cs)) : 0;
    const commOverhead = cs > 1 ? Math.min(30, allReduceTimeMs / 100 * 10) : 0;

    // Hex-cell scaling analysis
    const hexPowerKw = cfg.busPwr;
    const hexMassKg = cfg.dryMassKg || 1000;
    const hexRadM2 = cfg.radM2 || 100;
    const honeycombKgM2 = 3.5;  // old: Al honeycomb + ammonia heat pipes
    const solidPlateKgM2 = cfg.isDP3 ? 12 : 10;  // Al 6061-T6 solid plate, 3-5mm + carbon black coating
    const radMassDelta = (solidPlateKgM2 - honeycombKgM2) * hexRadM2;
    const solidPlateCostM2 = 160;  // $/m² for Al 6061-T6 + carbon black coating (cheaper than AZ-93)
    const honeycombCostM2 = 950;   // $/m² for honeycomb + heat pipes
    const radCostDelta = (solidPlateCostM2 - honeycombCostM2) * hexRadM2;
    const launchCostPenalty = radMassDelta * (cfg.launchCostPerKg || 500);

    // Fault tolerance: probability of losing >50% of cluster
    const mmodHitProbPerYear = 0.03;  // per hex-cell, solid plate is more robust
    const pAllSurvive = Math.pow(1 - mmodHitProbPerYear, cs * (cfg.satLife || 5));
    const faultToleranceLoss = 1 / cs;  // lose 1 hex = lose 1/N capacity

    ).join('');
}

// ORU ROLE SYSTEM — matches Onshape FeatureScript role dedication
// Per Onshape: each node does ALL roles, just biased toward one
//   Primary role gets ~60% of ORUs, secondary ~25%, tertiary ~15%
//   Colors scattered via LCG hash so the mix is visible across the panel
// =====================================================================
const ORU_ROLES = {
    decode:  { mat: MAT.decode,  color: '#ff3020', label: 'DECODE',  desc: 'Token generation — autoregressive sampling, memory-BW bound. Red ORUs run the decode phase of inference.' },
    prefill: { mat: MAT.prefill, color: '#2266ff', label: 'PREFILL', desc: 'Prompt processing — parallel KV-cache generation, compute bound. Blue ORUs handle initial prompt ingestion.' },
    context: { mat: MAT.context, color: '#22dd44', label: 'CONTEXT', desc: 'KV-cache storage & serving — high-capacity memory nodes. Green ORUs store long-context attention state.' },
    routing: { mat: new THREE.MeshStandardMaterial({ color: 0xffbb22, roughness: 0.35, metalness: 0.15, emissive: 0x663300, emissiveIntensity: 0.6 }),
               color: '#ffaa00', label: 'ROUTING', desc: 'Router/scheduler — request dispatch, load balancing, ground antenna control. Orange ORUs handle network coordination.' },
    compute: { mat: MAT.oru,     color: '#353840', label: 'COMPUTE', desc: 'General compute — flexible allocation between prefill/decode as load shifts. Gray ORUs are unbiased.' },
};

// Assign role to an ORU by index using LCG hash scatter
// Returns { role, mat, label } where role is one of the keys above
function getORURole(oruIdx, primaryRole) {
    // primary role determines the 60/25/15% color distribution
    // routing (center node): mostly orange, some red decode, some blue prefill
    const roleOrder = primaryRole === 'prefill'  ? ['prefill','decode','context'] :
                      primaryRole === 'context'  ? ['context','prefill','decode'] :
                      primaryRole === 'routing'  ? ['routing','decode','prefill'] :
                                                   ['decode','prefill','context'];  // default: decode-biased
    const bucket = (oruIdx * 7 + 3) % 20;
    let roleKey;
    if (bucket < 12)      roleKey = roleOrder[0];  // 60% primary
    else if (bucket < 17) roleKey = roleOrder[1];  // 25% secondary
    else                  roleKey = roleOrder[2];  // 15% tertiary
    const role = ORU_ROLES[roleKey];
    return { roleKey, mat: role.mat, label: role.label, desc: role.desc };
}
