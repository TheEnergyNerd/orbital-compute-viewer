function box(sx, sy, sz) { return new THREE.BoxGeometry(sx, sy, sz); }

function buildWingStructure(rootPos, span, chord, spanDir, chordDir, normalDir) {
    for (const frac of [-0.3, 0.3]) {
        const geo = box(spanDir[0]?span:0.06, spanDir[1]?span:0.06, spanDir[2]?span:0.06);
        const mesh = new THREE.Mesh(geo, MAT.truss);
        mesh.position.set(
            rootPos[0]+spanDir[0]*span/2+chordDir[0]*frac*chord-normalDir[0]*0.05,
            rootPos[1]+spanDir[1]*span/2+chordDir[1]*frac*chord-normalDir[1]*0.05,
            rootPos[2]+spanDir[2]*span/2+chordDir[2]*frac*chord-normalDir[2]*0.05
        );
        addPart(mesh, "structure", "Longeron");
    }
    const nBat = Math.max(1, Math.floor(span/4));
    for (let i = 1; i <= nBat; i++) {
        const t = i*4; if (t > span-0.5) continue;
        const bL = 0.6*chord;
        const geo = box(chordDir[0]?bL:0.04, chordDir[1]?bL:0.04, chordDir[2]?bL:0.04);
        const mesh = new THREE.Mesh(geo, MAT.brace);
        mesh.position.set(rootPos[0]+spanDir[0]*t-normalDir[0]*0.05, rootPos[1]+spanDir[1]*t-normalDir[1]*0.05, rootPos[2]+spanDir[2]*t-normalDir[2]*0.05);
        addPart(mesh, "structure", "Batten");
    }
    const rg = box(0.2,0.15,0.1); const rm = new THREE.Mesh(rg, MAT.pipe);
    rm.position.set(rootPos[0]-normalDir[0]*0.08, rootPos[1]-normalDir[1]*0.08, rootPos[2]-normalDir[2]*0.08);
    addPart(rm, "structure", "Root Stiffener");
    const dg = new THREE.CylinderGeometry(0.04,0.04,0.2,8); const dm = new THREE.Mesh(dg, MAT.brace);
    dm.position.set(rootPos[0]+spanDir[0]*span-normalDir[0]*0.1, rootPos[1]+spanDir[1]*span-normalDir[1]*0.1, rootPos[2]+spanDir[2]*span-normalDir[2]*0.1);
    if (chordDir[2]) dm.rotation.x = Math.PI/2;
    if (chordDir[0]) dm.rotation.z = Math.PI/2;
    addPart(dm, "structure", "Tip Damper");
}

function buildSpineBracing(bot, top, seg) {
    const hw = 0.3;
    const n = Math.max(1, Math.floor((top-bot)/seg));
    const h = (top-bot)/n;
    for (let i = 0; i < n; i++) {
        const yb = bot+i*h, yt = yb+h;
        const bl = Math.sqrt(h*h+(2*hw)*(2*hw));
        for (const [a,b2] of [[hw,-hw],[-hw,hw]]) {
            const g = new THREE.CylinderGeometry(0.025,0.025,bl,6);
            const m = new THREE.Mesh(g, MAT.brace); m.position.set((a+b2)/2,(yb+yt)/2,0);
            m.lookAt(b2,yt,0); m.rotateX(Math.PI/2); addPart(m,"structure","X-Brace");
        }
        for (const [a,b2] of [[hw,-hw],[-hw,hw]]) {
            const g = new THREE.CylinderGeometry(0.025,0.025,bl,6);
            const m = new THREE.Mesh(g, MAT.brace); m.position.set(0,(yb+yt)/2,(a+b2)/2);
            m.lookAt(0,yt,b2); m.rotateX(Math.PI/2); addPart(m,"structure","X-Brace");
        }
    }
}

function buildRadStiff(c, w, h, ax) {
    for (const f of [-0.25,0.25]) {
        let geo, pos;
        if (ax==='Z') { geo=box(0.06,h,0.06); pos=[c[0]+f*w,c[1],c[2]-0.05]; }
        else if (ax==='X') { geo=box(0.06,w,0.06); pos=[c[0]-0.05,c[1],c[2]+f*h]; }
        else { geo=box(w,0.06,0.06); pos=[c[0],c[1]-0.05,c[2]+f*h]; }
        const m = new THREE.Mesh(geo,MAT.truss); m.position.set(...pos);
        addPart(m,"structure","Radiator Longeron");
    }
}

function buildDP1(cfg) {
    // DP1 Starlink Compute v3 Mini — matches Onshape SatellitePlatformFS
    // Flat rectangular bus, 2 bifacial accordion solar wings ±X,
    // 4 long radiator panels with ORUs on anti-sun face, detailed structure
    const bW=cfg.busW||0.77, bD=cfg.busD||0.51, bL=cfg.busL||0.15;

    // --- Bus body ---
    const hub = new THREE.Mesh(box(bW,bL,bD),MAT.hub); addPart(hub,"hub","Spacecraft Bus");
    // PMAD module on bus
    const pmad = new THREE.Mesh(box(bW*0.5,bL*0.4,bD*0.3),MAT.gold);
    pmad.position.set(0,bL*0.15,0); addPart(pmad,"hub","PMAD");
    // Hot manifold (red copper pipe along bus)
    const hotManifold = new THREE.Mesh(box(bW*0.7,0.015,0.015),MAT.oru);
    hotManifold.position.set(0,-bL/2+0.02,bD*0.2); addPart(hotManifold,"structure","Hot Manifold");
    // Cold manifold
    const coldManifold = new THREE.Mesh(box(bW*0.7,0.015,0.015),MAT.pipe);
    coldManifold.position.set(0,-bL/2+0.02,-bD*0.2); addPart(coldManifold,"structure","Cold Manifold");
    // Harness raceways on sides
    for (const s of [1,-1]) {
        const harness = new THREE.Mesh(box(0.02,bL*0.8,bD*0.06),MAT.pipe);
        harness.position.set(s*bW/2+s*0.015,0,0); stationGroup.add(harness);
    }

    // --- 2 Bifacial accordion solar wings ±X ---
    const wingLen=cfg.pvWingL||7.5, wingW=cfg.pvWingW||3.4;
    const rootOffset = bW/2 + 0.08;
    const wZ = bL/2 + 0.02;

    for (let i=0;i<2;i++) {
        const dir = i===0 ? 1 : -1;
        const cx = dir*(rootOffset + wingLen/2);

        // Root bracket (truss material)
        const root = new THREE.Mesh(box(0.12,0.04,0.04),MAT.truss);
        root.position.set(dir*(rootOffset-0.05),wZ,0);
        addPart(root,"structure","Wing Root Bracket");

        // Hinge cylinder
        const hingeGeo = new THREE.CylinderGeometry(0.01,0.01,0.04,8);
        const hinge = new THREE.Mesh(hingeGeo,MAT.pipe);
        hinge.position.set(dir*rootOffset,wZ,0);
        hinge.rotation.x=Math.PI/2;
        stationGroup.add(hinge);

        // Main wing panel (solar face)
        const wing = new THREE.Mesh(box(wingLen,0.01,wingW),MAT.pv);
        wing.position.set(cx,wZ,0);
        addPart(wing,"pv_wing",`Solar Wing ${i===0?'+':'-'}X`);

        // Back face (bifacial — dark back emitter)
        const back = new THREE.Mesh(box(wingLen,0.005,wingW),MAT.pvBack);
        back.position.set(cx,wZ-0.008,0);
        addPart(back,"pv_wing","PV Back Face");

        // 2 primary spars (structural longerons under wing)
        for (const sf of [-0.30,0.30]) {
            const spar = new THREE.Mesh(box(wingLen*0.98,0.013,0.013),MAT.truss);
            spar.position.set(cx,wZ-0.012,sf*wingW);
            stationGroup.add(spar);
        }

        // Root gussets (triangular bracing at root)
        for (const gz of [0.015,-0.015]) {
            const gusset = new THREE.Mesh(box(0.14,0.006,0.07),MAT.truss);
            gusset.position.set(dir*(rootOffset+0.04),wZ+gz,0);
            stationGroup.add(gusset);
        }

        // CFRP tie rod (dark thin rod along top of wing)
        const tieRod = new THREE.Mesh(box(wingLen*0.40,0.009,0.009),MAT.hub);
        tieRod.position.set(dir*(rootOffset+wingLen*0.22),wZ+0.022,0);
        stationGroup.add(tieRod);

        // Segment joints (accordion fold lines across wing)
        const segCount = Math.max(5,Math.ceil(wingLen/0.8));
        for (let s=1;s<=segCount;s++) {
            const xs = cx + dir*(-wingLen/2 + wingLen*s/(segCount+1));
            const seam = new THREE.Mesh(box(0.003,0.006,wingW*0.94),MAT.seam);
            seam.position.set(xs,wZ+0.006,0);
            stationGroup.add(seam);
        }

        // Hinge lock pins along wing
        for (let lp=1;lp<=segCount;lp++) {
            const xs = cx + dir*(-wingLen/2 + wingLen*lp/(segCount+1));
            const lockGeo = new THREE.CylinderGeometry(0.003,0.003,0.015,6);
            const lock = new THREE.Mesh(lockGeo,MAT.pipe);
            lock.position.set(xs,wZ+0.006,0);
            stationGroup.add(lock);
        }

    }

    // --- Anti-sun face compute hardware (cold plate deck) ---
    const deckZ = -bL/2 - 0.001;
    const gpuCount = Math.min(Math.floor(cfg.computeKw*1000/cfg.gpuPowerW),100);
    const usableX = bW*0.82, usableZ = bD*0.78;
    const rows = Math.max(2,Math.ceil(Math.sqrt(gpuCount)));
    const cols = Math.max(1,Math.ceil(gpuCount/rows));
    // Cold plate deck
    const deck = new THREE.Mesh(box(usableX+0.03,0.004,usableZ+0.03),MAT.oru);
    deck.position.set(0,deckZ-0.003,0);
    addPart(deck,"oru","Compute Cold Plate Deck");
    // GPU modules on deck
    let gi=0;
    for(let r=0;r<rows&&gi<gpuCount;r++) for(let c=0;c<cols&&gi<gpuCount;c++){
        const gx = -usableX/2 + usableX*(c+0.5)/cols;
        const gz = -usableZ/2 + usableZ*(r+0.5)/rows;
        const gpu = new THREE.Mesh(box(0.04,0.008,0.04),MAT.oru);
        gpu.position.set(gx,deckZ-0.008,gz);
        if(gi===0) addPart(gpu,"oru","GPU Module");
        else { gpu.userData={partType:"oru",label:`GPU ${gi+1}`}; stationGroup.add(gpu); partRegistry.push({mesh:gpu,partType:"oru",label:`GPU ${gi+1}`,originalMaterial:gpu.material}); }
        gi++;
    }

    // --- DP1 has NO separate radiator panels ---
    // The bus anti-sun face itself is the radiator (Starlink-like body-mount thermal)
    const radFace = new THREE.Mesh(box(bW*0.95,0.003,bD*0.95),MAT.rad);
    radFace.position.set(0,-bL/2-0.002,0);
    addPart(radFace,"radiator","Bus Radiator Face (body-mount)");

    // --- 4 ISL laser terminals ---
    for (let i=0;i<(cfg.islCount||4);i++){
        const angle = i*Math.PI/2 + Math.PI/4;
        const lt=new THREE.Mesh(new THREE.CylinderGeometry(0.04,0.04,0.10,8),MAT.antenna);
        lt.position.set(Math.cos(angle)*bW*0.4, bL/2+0.06, Math.sin(angle)*bD*0.3);
        addPart(lt,"dragonfly_link","ISL Terminal "+(i+1));
    }
}

function buildDP1B(cfg) {
    // ================================================================
    // DP1B AI SAT MINI — SpaceX 100kW AI satellite
    //
    // Scaled-up Starlink V2 mini — SAME FORM FACTOR, just ~4× bigger.
    //
    // Starlink V2 mini:  1.3m × 0.8m × 0.05m body, 7m wingspan, ~2.5 kW
    // AI Sat Mini:       5.0m × 2.5m × 0.15m body, 35m wingspan, 100 kW
    //
    // Layout (identical to Starlink, just bigger):
    //   - Flat rectangular bus body, oriented horizontally
    //   - 2 roll-out solar wings extending ±X from bus (skinny & long)
    //   - ORUs on anti-sun face (-Y) of bus
    //   - Bus -Y face = primary radiator (carbon black, body IS radiator)
    //   - 2 deployable radiator panels hinging from ±Z edges of bus
    //   - 4 ISL laser terminals
    // ================================================================
    const bW = 4.0, bD = 2.0, bH = 0.12;  // bus body: X × Z × Y (flat, like Starlink)
    const wingChord = 3.0;                 // Z chord — set by spool width (fairing constraint)
    const wingSpan = Math.ceil(cfg.solarM2 / 2 / wingChord);  // X span per wing (~60m for 360 m²)
    // Radiator panel below bus (DP2-style, separate from bus)
    const radC = Math.sqrt(cfg.radM2 / 4);  // chord
    const radS = 4 * radC;                   // span (4:1 aspect — long and narrow)

    // ── BUS BODY ──
    const bus = new THREE.Mesh(box(bW, bH, bD), MAT.hub);
    addPart(bus, "hub", `Spacecraft Bus (${bW}m × ${bD}m × ${bH}m)`);

    // Seam lines
    const seamMat = new THREE.MeshStandardMaterial({color:0x111115, roughness:0.5});
    for (let i=1;i<3;i++){const s=new THREE.Mesh(box(0.010,bH+0.01,bD*0.95),seamMat);s.position.set(-bW/2+bW*i/3,0,0);stationGroup.add(s);}
    const cs2=new THREE.Mesh(box(bW*0.95,bH+0.01,0.010),seamMat);stationGroup.add(cs2);

    // Sun face (+Y) = MLI
    const sunFace = new THREE.Mesh(box(bW*0.97,0.004,bD*0.97),MAT.mli);
    sunFace.position.set(0,bH/2+0.003,0); stationGroup.add(sunFace);

    // PMAD
    const pmad = new THREE.Mesh(box(bW*0.3,bH*0.5,bD*0.25),MAT.gold);
    pmad.position.set(0,bH*0.12,bD*0.2); addPart(pmad,"hub","PMAD + Flight Computer");

    // Antenna
    const ant = new THREE.Mesh(new THREE.CylinderGeometry(0.3,0.3,0.08,16),MAT.antenna);
    ant.position.set(0,bH/2+0.06,-bD*0.15); addPart(ant,"hub","Ka-band Phased Array");

    // ── ROLL-OUT SOLAR WINGS ±X (skinny & long — ~20:1 aspect ratio) ──
    const wingY = bH/2+0.012;
    for (let side=0;side<2;side++){
        const dir=side===0?1:-1;
        const rootX=dir*(bW/2+0.06);
        const cx=dir*(bW/2+wingSpan/2+0.06);

        // Root bracket / spool housing
        const root=new THREE.Mesh(box(0.10,0.04,wingChord*0.6),MAT.truss);
        root.position.set(rootX,wingY,0); addPart(root,"structure","Wing Root / Spool");

        // Hinge cylinder
        const hG=new THREE.CylinderGeometry(0.015,0.015,wingChord*0.4,8);
        const h=new THREE.Mesh(hG,MAT.pipe);h.position.set(rootX,wingY,0);h.rotation.x=Math.PI/2;stationGroup.add(h);

        // Main solar panel — SKINNY AND LONG
        const wing=new THREE.Mesh(box(wingSpan,0.010,wingChord),MAT.pv);
        wing.position.set(cx,wingY,0);addPart(wing,"pv_wing",`Solar Wing ${dir>0?'+':'-'}X (${wingSpan}m × ${wingChord}m)`);

        // Back face
        const back=new THREE.Mesh(box(wingSpan,0.005,wingChord),MAT.pvBack);
        back.position.set(cx,wingY-0.008,0);stationGroup.add(back);

        // 2 longerons running along X
        for(const sf of [-0.35,0.35]){const sp=new THREE.Mesh(box(wingSpan*0.97,0.012,0.012),MAT.truss);sp.position.set(cx,wingY-0.012,sf*wingChord);stationGroup.add(sp);}

        // Root gussets
        for(const gz of [0.008,-0.008]){const g=new THREE.Mesh(box(0.14,0.005,0.06),MAT.truss);g.position.set(rootX+dir*0.04,wingY+gz,0);stationGroup.add(g);}

        // Accordion fold lines
        const segC=Math.max(15,Math.ceil(wingSpan/3));
        for(let s=1;s<=segC;s++){const xs=cx+dir*(-wingSpan/2+wingSpan*s/(segC+1));const sm=new THREE.Mesh(box(0.003,0.005,wingChord*0.94),MAT.seam);sm.position.set(xs,wingY+0.006,0);stationGroup.add(sm);}

        // Tie rod
        const tr=new THREE.Mesh(box(wingSpan*0.35,0.008,0.008),MAT.hub);
        tr.position.set(dir*(bW/2+wingSpan*0.2+0.06),wingY+0.018,0);stationGroup.add(tr);
    }

    // ── DEPLOYABLE RADIATOR FINS (same architecture as DP2) ──
    // Vertical fin panels fold out from ±Z bus edges
    // Tall along Y, wide along X, thin along Z — like vertical walls
    // Single radiator panel on anti-sun side (-Z), same as DP2
    const radArea1B = cfg.radM2;
    const radAspect1B = 1/6;  // tall and narrow: height = 6× width
    const radLen1B = Math.sqrt(radArea1B * radAspect1B);  // X (narrow)
    const radH1B = radArea1B / radLen1B;
    const radThick = 0.025;
    const radGap1B = 0.15;

    const hpMat1B = new THREE.MeshStandardMaterial({color: 0xd0d0dd, roughness: 0.35, metalness: 0.4});

    const gpuCount = cfg.gpuCount || 48;
    const [ow,oh,od] = cfg.oruSize || [0.6, 0.4, 0.06];

    const radX1B = 0;
    const radY1B = -(bH / 2 + radH1B / 2 + radGap1B);
    const radZ1B = 0;  // centered — T-shape: radiator hangs straight down from bus

    // Hinge
    const hinge1B = new THREE.Mesh(box(radLen1B * 0.3, 0.04, 0.03), MAT.truss);
    hinge1B.position.set(0, -(bH / 2 + 0.02), 0);  // centered for T-shape
    stationGroup.add(hinge1B);

    // Single radiator panel (XY plane, -Z face to deep space)
    const radPanel1B = new THREE.Mesh(box(radLen1B, radH1B, radThick), MAT.rad);
    radPanel1B.position.set(radX1B, radY1B, radZ1B);
    addPart(radPanel1B, "radiator", `Deployable Radiator — ${radArea1B.toFixed(0)}m² (${radLen1B.toFixed(1)}m × ${radH1B.toFixed(1)}m)`);

    // Heat pipes
    for (let hp = 0; hp < 3; hp++) {
        const hpX = -radLen1B / 2 + radLen1B * (hp + 1) / 4;
        const hpM = new THREE.Mesh(box(0.006, radH1B * 0.9, radThick + 0.003), hpMat1B);
        hpM.position.set(hpX, radY1B, radZ1B);
        stationGroup.add(hpM);
    }

    // Fold seams
    for (let f = 1; f <= 3; f++) {
        const foldY = -radH1B / 2 + radH1B * f / 4;
        const foldLine = new THREE.Mesh(box(radLen1B * 0.95, 0.008, radThick + 0.004), MAT.seam);
        foldLine.position.set(0, radY1B + foldY, radZ1B);
        stationGroup.add(foldLine);
    }

    // ORUs on -Z face
    const fCols1B = Math.max(1, Math.floor(Math.sqrt(gpuCount * radAspect1B)));
    const fRows1B = Math.max(1, Math.floor(gpuCount / fCols1B));
    const fsw1B = radLen1B / (fCols1B + 1), fsh1B = radH1B / (fRows1B + 1);
    for (let c = 0; c < fCols1B; c++) for (let r = 0; r < fRows1B; r++) {
        const oruIdx = c * fRows1B + r;
        if (oruIdx >= gpuCount) break;
        const role = getORURole(oruIdx, cfg.oruPrimaryRole || 'decode');
        const ox = -radLen1B / 2 + fsw1B * (c + 1);
        const oy = -radH1B / 2 + fsh1B * (r + 1);
        const oru = new THREE.Mesh(box(ow, oh, od), role.mat);
        oru.position.set(ox, radY1B + oy, radZ1B - (radThick / 2 + od / 2));
        addPart(oru, "oru", `ORU [${c},${r}] — ${role.label}`);
    }

    // Manifolds on bus
    const hot=new THREE.Mesh(box(bW*0.6,0.012,0.012),MAT.oru);hot.position.set(0,-bH/2+0.015,bD*0.15);addPart(hot,"structure","Hot Manifold");
    const cold=new THREE.Mesh(box(bW*0.6,0.012,0.012),MAT.pipe);cold.position.set(0,-bH/2+0.015,-bD*0.15);addPart(cold,"structure","Cold Manifold");

    // ── ISL TERMINALS ──
    for(let i=0;i<(cfg.islCount||4);i++){const a=i*Math.PI/2+Math.PI/4;const lt=new THREE.Mesh(new THREE.CylinderGeometry(0.04,0.04,0.08,8),MAT.antenna);lt.position.set(Math.cos(a)*bW*0.35,bH/2+0.06,Math.sin(a)*bD*0.3);addPart(lt,"dragonfly_link","ISL Terminal "+(i+1));}

    // ── SCALE REFERENCE: Starlink V2 mini ──
    const refGroup=new THREE.Group();
    const refBody=new THREE.Mesh(box(1.3,0.05,0.8),new THREE.MeshStandardMaterial({color:0xff8800,transparent:true,opacity:0.5}));
    const refP1=new THREE.Mesh(box(3.5,0.01,1.7),new THREE.MeshStandardMaterial({color:0xff8800,transparent:true,opacity:0.3}));
    refP1.position.set(2.4,0,0);const refP2=refP1.clone();refP2.position.set(-2.4,0,0);
    refGroup.add(refBody,refP1,refP2);
    const bb=new THREE.Box3().setFromObject(stationGroup);
    refGroup.position.set(-bW*0.4,bb.min.y-2,bD*0.4);
    refGroup.userData={partType:'scale_ref',label:'Starlink V2 mini (7m × 3.5m) — scale reference'};
    stationGroup.add(refGroup);
    const slL='Starlink V2 mini (7m × 3.5m) — scale reference';
    partRegistry.push({mesh:refBody,partType:'scale_ref',label:slL,originalMaterial:refBody.material});
    partRegistry.push({mesh:refP1,partType:'scale_ref',label:slL,originalMaterial:refP1.material});
    partRegistry.push({mesh:refP2,partType:'scale_ref',label:slL,originalMaterial:refP2.material});
}

function buildT1(cfg) {
    // T1 Tanj Hex Flat-Pack — matches Onshape SatellitePlatformFS
    // DEPLOYED: linear chain of hexagonal tiles along X axis
    // Each tile is a self-contained solar+compute+radiator panel
    // with embedded GPU die, copper spreader, turbo pump, vapor channels
    const panelAcross = cfg.hexPanelAcross||2.5;
    const panelTh = cfg.hexPanelTh||0.045;
    const panelCount = cfg.hexPanelCount||15;
    const circumR = panelAcross/(2*Math.cos(Math.PI/6));
    const pitch = panelAcross * 1.04;
    const x0 = -(panelCount-1)*pitch/2;

    // Material for copper spreader
    const copperMat = new THREE.MeshStandardMaterial({color:0xb87333,metalness:0.8,roughness:0.3,emissive:0xb87333,emissiveIntensity:0.1});
    // Hot channel material
    const hotMat = new THREE.MeshStandardMaterial({color:0xcc3322,emissive:0xcc3322,emissiveIntensity:0.15});
    // Return wick material
    const wickMat = new THREE.MeshStandardMaterial({color:0x5577aa,emissive:0x5577aa,emissiveIntensity:0.1});

    for (let i=0;i<panelCount;i++) {
        const px = x0 + i*pitch;

        // Main hex panel structure (dark gray)
        const panelGeo = new THREE.CylinderGeometry(circumR,circumR,panelTh,6);
        const panel = new THREE.Mesh(panelGeo,MAT.hub);
        panel.position.set(px,0,0);
        if(i===0) addPart(panel,"hub",`Hex Tile Chain (${panelCount} panels)`);
        else { panel.userData={partType:"hub",label:`Hex Panel ${i+1}`}; stationGroup.add(panel); partRegistry.push({mesh:panel,partType:"hub",label:`Hex Panel ${i+1}`,originalMaterial:panel.material}); }

        // Top face: solar (blue) — thin disc on top
        const topGeo = new THREE.CylinderGeometry(circumR*0.98,circumR*0.98,0.002,6);
        const top = new THREE.Mesh(topGeo,MAT.pv);
        top.position.set(px,panelTh/2+0.001,0);
        if(i===0) addPart(top,"pv_wing","Solar Face");
        else { top.userData={partType:"pv_wing",label:`Solar Face ${i+1}`}; stationGroup.add(top); partRegistry.push({mesh:top,partType:"pv_wing",label:`Solar Face ${i+1}`,originalMaterial:top.material}); }

        // Bottom face: radiator (black) — thin disc on bottom
        const botGeo = new THREE.CylinderGeometry(circumR*0.98,circumR*0.98,0.002,6);
        const botMat = new THREE.MeshStandardMaterial({color:0x0d0d0e,emissive:0x0d0d0e,emissiveIntensity:0.05});
        const bot = new THREE.Mesh(botGeo,botMat);
        bot.position.set(px,-panelTh/2-0.001,0);
        if(i===0) addPart(bot,"radiator","Radiator Face");
        else { bot.userData={partType:"radiator",label:`Radiator Face ${i+1}`}; stationGroup.add(bot); partRegistry.push({mesh:bot,partType:"radiator",label:`Radiator Face ${i+1}`,originalMaterial:bot.material}); }

        // Reflective perimeter ring (silver ring around bottom edge)
        const ringGeo = new THREE.TorusGeometry(circumR*0.95,0.008,6,6);
        const ringMat = new THREE.MeshStandardMaterial({color:0xd6dae0,metalness:0.6,roughness:0.3,emissive:0xd6dae0,emissiveIntensity:0.08});
        const ring = new THREE.Mesh(ringGeo,ringMat);
        ring.position.set(px,-panelTh/2-0.002,0);
        ring.rotation.x=Math.PI/2;
        stationGroup.add(ring);

        // Edge sockets at 6 vertices (mechanical interconnect)
        for (let s=0;s<6;s++) {
            const a = (s*60+30)*Math.PI/180;
            const sx = px + Math.cos(a)*circumR*0.97;
            const sz = Math.sin(a)*circumR*0.97;
            const sockGeo = new THREE.CylinderGeometry(0.008,0.008,0.012,6);
            const sock = new THREE.Mesh(sockGeo,MAT.pipe);
            sock.position.set(sx,0,sz);
            stationGroup.add(sock);
        }

        // Embedded GPU die — enlarged for clickability (visible square on underside)
        const gpuDie = new THREE.Mesh(box(0.12,0.006,0.12),MAT.oru);
        gpuDie.position.set(px,-panelTh/2-0.004,0);
        if(i===0) addPart(gpuDie,"oru","Embedded ASIC");
        else { gpuDie.userData={partType:"oru",label:`ASIC ${i+1}`}; stationGroup.add(gpuDie); partRegistry.push({mesh:gpuDie,partType:"oru",label:`ASIC ${i+1}`,originalMaterial:gpuDie.material}); }

        // Copper spreader plate (wider, under GPU die)
        const spreader = new THREE.Mesh(box(0.20,0.003,0.20),copperMat);
        spreader.position.set(px,-panelTh/2-0.001,0);
        stationGroup.add(spreader);

        // Micro turbo pump (small cylinder offset from center)
        const pumpGeo = new THREE.CylinderGeometry(0.010,0.010,0.006,8);
        const pump = new THREE.Mesh(pumpGeo,MAT.pipe);
        pump.position.set(px+0.06,-panelTh/2-0.002,0);
        stationGroup.add(pump);

        // 6 outflow vapor channels (radial red lines on underside)
        for (let ch=0;ch<6;ch++) {
            const th = ch*Math.PI/3;
            const chLen = panelAcross*0.30;
            const chx = px + Math.cos(th)*panelAcross*0.08;
            const chz = Math.sin(th)*panelAcross*0.08;
            const channel = new THREE.Mesh(box(chLen,0.001,0.015),hotMat);
            channel.position.set(chx,-panelTh/2-0.002,chz);
            channel.rotation.y = -th;
            stationGroup.add(channel);
        }

        // 6 return wick channels (offset blue lines)
        for (let ch=0;ch<6;ch++) {
            const th = ch*Math.PI/3 + Math.PI/6;
            const chLen = panelAcross*0.23;
            const chx = px + Math.cos(th)*panelAcross*0.07;
            const chz = Math.sin(th)*panelAcross*0.07;
            const wick = new THREE.Mesh(box(chLen,0.0008,0.006),wickMat);
            wick.position.set(chx,-panelTh/2-0.0015,chz);
            wick.rotation.y = -th;
            stationGroup.add(wick);
        }
    }

    // End-of-chain antenna panel (rotated 90 deg hex at +X end)
    const endX = x0 + (panelCount-1)*pitch + panelAcross*0.55;
    const antPanelGeo = new THREE.CylinderGeometry(circumR*0.94,circumR*0.94,panelTh,6);
    const antPanel = new THREE.Mesh(antPanelGeo,MAT.hub);
    antPanel.position.set(endX,0,0);
    antPanel.rotation.z = Math.PI/2; // rotated 90 degrees
    addPart(antPanel,"hub","Antenna Panel (end-of-chain)");

    // Comm module on antenna panel
    const commBox = new THREE.Mesh(box(0.09,0.12,0.10),MAT.antenna);
    commBox.position.set(endX+panelTh/2+0.08,0.18,0);
    addPart(commBox,"dragonfly_link","End Comm Module");

    // Antenna aperture
    const apGeo = new THREE.CylinderGeometry(0.03,0.03,0.01,12);
    const aperture = new THREE.Mesh(apGeo,new THREE.MeshStandardMaterial({color:0x94cdf0,emissive:0x94cdf0,emissiveIntensity:0.2}));
    aperture.position.set(endX+panelTh/2+0.12,0.18,0);
    aperture.rotation.z=Math.PI/2;
    addPart(aperture,"dragonfly_link","Antenna Aperture");

    // Walking assembly robot (orange box at -X end of chain)
    const robotX = x0 - panelAcross*0.18;
    const robot = new THREE.Mesh(box(0.15,0.10,0.15),
        new THREE.MeshStandardMaterial({color:0xfa9410,emissive:0xfa9410,emissiveIntensity:0.15}));
    robot.position.set(robotX,panelTh/2+0.06,0);
    addPart(robot,"structure","Walking Assembly Robot");

    // Robot arms
    for (const az of [-0.055,0.055]) {
        const armGeo = new THREE.CylinderGeometry(0.006,0.006,0.06,6);
        const arm = new THREE.Mesh(armGeo,new THREE.MeshStandardMaterial({color:0xe67502,emissive:0xe67502,emissiveIntensity:0.1}));
        arm.position.set(robotX-0.06,panelTh/2+0.02,az);
        stationGroup.add(arm);
    }

    // ISL terminals (at ends of chain)
    for (let i=0;i<2;i++){
        const ltx = i===0 ? x0-panelAcross*0.3 : endX+0.3;
        const lt=new THREE.Mesh(new THREE.CylinderGeometry(0.04,0.04,0.10,8),MAT.antenna);
        lt.position.set(ltx,-panelTh/2-0.06,0);
        addPart(lt,"dragonfly_link","ISL Terminal "+(i+1));
    }

    // Scale reference: Starlink V2 mini (7m x 3.5m)
    const refGroup = new THREE.Group();
    const refBody = new THREE.Mesh(box(1.3, 0.05, 0.8), new THREE.MeshStandardMaterial({color: 0xff8800, transparent: true, opacity: 0.5}));
    const refPanel1 = new THREE.Mesh(box(3.5, 0.01, 1.7), new THREE.MeshStandardMaterial({color: 0xff8800, transparent: true, opacity: 0.3}));
    refPanel1.position.set(2.4, 0, 0);
    const refPanel2 = refPanel1.clone();
    refPanel2.position.set(-2.4, 0, 0);
    refGroup.add(refBody, refPanel1, refPanel2);
    const bbox1 = new THREE.Box3().setFromObject(stationGroup);
    const bsize1 = bbox1.getSize(new THREE.Vector3());
    refGroup.position.set(-bsize1.x * 0.4, bbox1.min.y - 3, bsize1.z * 0.3);
    refGroup.userData = { partType: 'scale_ref', label: 'Starlink V2 mini (7m \u00d7 3.5m) \u2014 scale reference' };
    stationGroup.add(refGroup);
    const slLabel = 'Starlink V2 mini (7m \u00d7 3.5m) \u2014 scale reference';
    partRegistry.push({mesh: refBody, partType: 'scale_ref', label: slLabel, originalMaterial: refBody.material});
    partRegistry.push({mesh: refPanel1, partType: 'scale_ref', label: slLabel, originalMaterial: refPanel1.material});
    partRegistry.push({mesh: refPanel2, partType: 'scale_ref', label: slLabel, originalMaterial: refPanel2.material});
}

function buildDP2(cfg) {
    const hubX=1.2,hubY=0.8,hubZ=0.6;
    const hub = new THREE.Mesh(box(hubX,hubY,hubZ),MAT.hub); addPart(hub,"hub","Spacecraft Bus");
    const pmad = new THREE.Mesh(box(hubX*0.8,hubY*0.8,hubZ*0.25),MAT.gold);
    pmad.position.set(0,0,hubZ/2+hubZ*0.125); addPart(pmad,"hub","PMAD");
    const ant = new THREE.Mesh(new THREE.CylinderGeometry(0.4,0.4,0.15,16),MAT.antenna);
    ant.rotation.z=Math.PI/2; ant.position.set(hubX/2+0.1,0,0); addPart(ant,"hub","Ground Antenna");

    // Skinny-and-long roll-out panels: chord ~3.5m (spool width), span grows with area
    const pvC = 3.5;  // Z chord — set by spool/fairing width
    const pvS = Math.ceil(cfg.solarM2 / 2 / pvC);  // X span per wing (~103m for 723 m²)
    const pvY = hubY/2+0.02;
    for (const s of [1,-1]) {
        const f = new THREE.Mesh(box(pvS,0.02,pvC),MAT.pv); f.position.set(s*pvS/2,pvY+0.015,0);
        addPart(f,"pv_wing",`PV ${s>0?'+':'-'}X`);
        const b = new THREE.Mesh(box(pvS,0.02,pvC),MAT.pvBack); b.position.set(s*pvS/2,pvY-0.015,0);
        addPart(b,"pv_wing",`PV Back ${s>0?'+':'-'}X`);
        for (let x=4;x<pvS;x+=4) { const sm=new THREE.Mesh(box(0.03,0.015,pvC),MAT.seam); sm.position.set(s*x,pvY+0.015,0); stationGroup.add(sm); }
    }
    buildWingStructure([0,pvY,0],pvS,pvC,[1,0,0],[0,0,1],[0,1,0]);
    buildWingStructure([0,pvY,0],pvS,pvC,[-1,0,0],[0,0,1],[0,1,0]);

    // Deployment hinges at PV wing roots
    for (const s of [1, -1]) {
        const hinge = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 0.12, 12), MAT.pipe);
        hinge.position.set(s * hubX/2, pvY, 0);
        hinge.rotation.z = Math.PI / 2;
        addPart(hinge, "structure", "PV Deployment Hinge");
    }

    // ── DEPLOYABLE RADIATOR FINS ──
    // SpaceX AI Sat Mini style: vertical fin panels fold out from ±Z bus edges
    // Single radiator panel on anti-sun side (-Z), deployed below bus
    // One continuous panel (folds for launch, deploys as one piece)
    //
    // -Z face radiates to deep space (VF ≈ 1.0)
    // +Z face sees bus underside (acceptable — bus is small)
    // No mutual view factor issues — single panel, not split
    // XY plane, normal ±Z, same orientation as solar wings
    const radArea = cfg.radM2;
    const radAspect = 1/6;  // tall and narrow: height = 6× width
    const radLen = Math.sqrt(radArea * radAspect);   // X (narrow)
    const radH = radArea / radLen;                     // Y (hanging down)
    const radThick = 0.03;
    const radGap = 0.2;

    const hpMat = new THREE.MeshStandardMaterial({color: 0xd0d0dd, roughness: 0.35, metalness: 0.4});
    const frameMat = new THREE.MeshStandardMaterial({color: 0xaaaabc, roughness: 0.4, metalness: 0.5});

    const oc = Math.min(Math.floor(cfg.computeKw * 1000 / cfg.gpuPowerW), 300);
    const [ow, oh, od] = cfg.oruSize;

    // Position: centered on X, hanging below bus in -Y, on anti-sun side (-Z)
    const radX = 0;
    const radY2 = -(hubY / 2 + radH / 2 + radGap);
    const radZ = 0;  // centered — T-shape: radiator hangs straight down from bus

    // Hinge rail along bus bottom (centered for T-shape)
    const hinge = new THREE.Mesh(box(radLen * 0.4, 0.06, 0.04), MAT.truss);
    hinge.position.set(0, -(hubY / 2 + 0.03), 0);
    stationGroup.add(hinge);

    // Main radiator panel (XY plane, thin in Z)
    const radPanel = new THREE.Mesh(box(radLen, radH, radThick), MAT.rad);
    radPanel.position.set(radX, radY2, radZ);
    addPart(radPanel, "radiator", `Deployable Radiator — ${radArea.toFixed(0)}m² (${radLen.toFixed(1)}m × ${radH.toFixed(1)}m)`);

    // Heat pipe lines running vertically (along Y)
    for (let hp = 0; hp < 4; hp++) {
        const hpX = -radLen / 2 + radLen * (hp + 1) / 5;
        const hpMesh = new THREE.Mesh(box(0.008, radH * 0.9, radThick + 0.003), hpMat);
        hpMesh.position.set(hpX, radY2, radZ);
        stationGroup.add(hpMesh);
    }

    // Edge frame
    for (const [fw, fh, fx2, fy2] of [
        [radLen + 0.03, 0.02, 0, radH / 2],
        [radLen + 0.03, 0.02, 0, -radH / 2],
        [0.02, radH, radLen / 2, 0],
        [0.02, radH, -radLen / 2, 0],
    ]) {
        const fr = new THREE.Mesh(box(fw, fh, radThick + 0.006), frameMat);
        fr.position.set(fx2, radY2 + fy2, radZ);
        stationGroup.add(fr);
    }

    // Fold lines (panel was folded for launch — show 3 fold seams)
    for (let f = 1; f <= 3; f++) {
        const foldY = -radH / 2 + radH * f / 4;
        const foldLine = new THREE.Mesh(box(radLen * 0.95, 0.01, radThick + 0.005), MAT.seam);
        foldLine.position.set(0, radY2 + foldY, radZ);
        stationGroup.add(foldLine);
    }

    // ORUs on -Z face (anti-sun, deep space facing)
    if (!cfg.centralized) {
        const finCols = Math.max(1, Math.floor(Math.sqrt(oc * radAspect)));
        const finRows = Math.max(1, Math.floor(oc / finCols));
        const sw = radLen / (finCols + 1), sh = radH / (finRows + 1);
        for (let c = 0; c < finCols; c++) for (let r = 0; r < finRows; r++) {
            const oruIdx = c * finRows + r;
            if (oruIdx >= oc) break;
            const role = getORURole(oruIdx, cfg.oruPrimaryRole || 'decode');
            const ox = -radLen / 2 + sw * (c + 1);
            const oy = -radH / 2 + sh * (r + 1);
            const oru = new THREE.Mesh(box(ow, oh, od), role.mat);
            oru.position.set(ox, radY2 + oy, radZ - (radThick / 2 + od / 2));
            addPart(oru, "oru", `ORU [${c},${r}] — ${role.label}`);
        }
    }

    if (!cfg.centralized) {
        // ORUs already placed on radiator panel above
        // Add thermal manifold pipes from bus to radiator (visible plumbing)
        const manifoldMat = new THREE.MeshStandardMaterial({color:0xcc4422,metalness:0.5,roughness:0.4,emissive:0xaa2211,emissiveIntensity:0.12});
        const returnMat = new THREE.MeshStandardMaterial({color:0x3366aa,metalness:0.5,roughness:0.4,emissive:0x1133aa,emissiveIntensity:0.12});
        const pipeLen = Math.abs(radY2) - hubY/2;
        if (pipeLen > 0.5) {
            const pipeMidY = -(hubY/2 + pipeLen/2);
            // Hot manifold (red) — heat from ORUs to radiator
            const hotM = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, pipeLen, 8), manifoldMat);
            hotM.position.set(-radLen * 0.15, pipeMidY, 0);
            addPart(hotM, "structure", "Thermal Manifold (hot)");
            // Cold return (blue) — cooled fluid returns
            const coldM = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, pipeLen, 8), returnMat);
            coldM.position.set(radLen * 0.15, pipeMidY, 0);
            addPart(coldM, "structure", "Thermal Manifold (cold return)");
            // Cross manifold at bus interface
            const xManifold = new THREE.Mesh(box(radLen * 0.4, 0.02, 0.02), manifoldMat);
            xManifold.position.set(0, -(hubY/2 + 0.04), 0);
            stationGroup.add(xManifold);
        }
    } else {
        // === Centralized compute bay (space-adapted rack architecture) ===
        // Pressurized compute enclosure mounted between bus and radiator
        const bayW = hubX*0.9, bayH = 1.6, bayD = hubZ*0.85;
        const bayY = -(hubY/2 + bayH/2 + 0.15);

        // Outer pressure vessel (cylindrical sleeve with end caps)
        const vesselGeo = new THREE.CylinderGeometry(bayW/2, bayW/2, bayH, 16, 1, true);
        const vesselMat = new THREE.MeshStandardMaterial({color:0x556677,metalness:0.7,roughness:0.25,transparent:true,opacity:0.25,side:THREE.DoubleSide});
        const vessel = new THREE.Mesh(vesselGeo, vesselMat);
        vessel.position.set(0, bayY, 0);
        addPart(vessel,"hub","Compute Pressure Vessel");

        // End caps (top and bottom)
        for (const capDir of [1,-1]) {
            const capGeo = new THREE.CylinderGeometry(bayW/2, bayW/2, 0.02, 16);
            const cap = new THREE.Mesh(capGeo, new THREE.MeshStandardMaterial({color:0x667788,metalness:0.6,roughness:0.3}));
            cap.position.set(0, bayY + capDir*bayH/2, 0);
            stationGroup.add(cap);
        }

        // Central coolant spine (vertical manifold through center)
        const spineH = bayH*0.85;
        const spineMat = new THREE.MeshStandardMaterial({color:0x3366aa,metalness:0.5,roughness:0.4,emissive:0x1133aa,emissiveIntensity:0.15});
        const coolSpine = new THREE.Mesh(new THREE.CylinderGeometry(0.04,0.04,spineH,8), spineMat);
        coolSpine.position.set(0, bayY, 0);
        addPart(coolSpine,"structure","Coolant Supply Manifold");

        // Return manifold (parallel pipe)
        const retMat = new THREE.MeshStandardMaterial({color:0xcc4422,metalness:0.5,roughness:0.4,emissive:0xaa2211,emissiveIntensity:0.12});
        const retSpine = new THREE.Mesh(new THREE.CylinderGeometry(0.035,0.035,spineH,8), retMat);
        retSpine.position.set(0.12, bayY, 0);
        addPart(retSpine,"structure","Coolant Return Manifold");

        // GPU tray shelves (horizontal cold plates stacked vertically)
        const gpuCount = Math.min(Math.floor(cfg.computeKw*1000/cfg.gpuPowerW), 96);
        const shelfCount = Math.max(4, Math.ceil(gpuCount / 8));
        const shelfSpacing = spineH / (shelfCount + 1);
        const shelfW = bayW*0.7, shelfD = bayW*0.55;

        for (let s=0; s<shelfCount; s++) {
            const sy = bayY - spineH/2 + shelfSpacing*(s+1);

            // Cold plate shelf (copper-colored tray)
            const cpMat = new THREE.MeshStandardMaterial({color:0xb87333,metalness:0.7,roughness:0.3,emissive:0xb87333,emissiveIntensity:0.08});
            const shelf = new THREE.Mesh(box(shelfW, 0.008, shelfD), cpMat);
            shelf.position.set(0, sy, 0);
            if(s===0) addPart(shelf,"oru","Cold Plate Shelf");
            else { shelf.userData={partType:"oru",label:`Cold Plate ${s+1}`}; stationGroup.add(shelf); partRegistry.push({mesh:shelf,partType:"oru",label:`Cold Plate ${s+1}`,originalMaterial:shelf.material}); }

            // GPU modules on each shelf (4 per side)
            const gpusPerShelf = Math.min(8, gpuCount - s*8);
            for (let g=0; g<gpusPerShelf; g++) {
                const gx = -shelfW/2 + shelfW*(g+0.5)/Math.min(gpusPerShelf,8);
                const gpu = new THREE.Mesh(box(0.06, 0.02, 0.05), MAT.oru);
                gpu.position.set(gx, sy + 0.018, 0);
                const label = `GPU ${s*8+g+1}`;
                gpu.userData={partType:"oru",label}; stationGroup.add(gpu);
                partRegistry.push({mesh:gpu,partType:"oru",label,originalMaterial:gpu.material});
            }

            // Coolant branch lines (blue from spine to shelf edges)
            for (const side of [-1,1]) {
                const branchLen = shelfW*0.35;
                const branch = new THREE.Mesh(box(branchLen, 0.012, 0.012), spineMat);
                branch.position.set(side*branchLen/2, sy-0.012, 0);
                stationGroup.add(branch);
            }
        }

        // Pumped-loop circulation pump (bottom of bay)
        const pumpY = bayY - bayH/2 + 0.12;
        const pumpGeo = new THREE.CylinderGeometry(0.06, 0.06, 0.10, 12);
        const pump = new THREE.Mesh(pumpGeo, new THREE.MeshStandardMaterial({color:0x88aacc,metalness:0.6,roughness:0.3,emissive:0x5588bb,emissiveIntensity:0.1}));
        pump.position.set(-0.08, pumpY, 0);
        addPart(pump,"structure","Pumped-Loop Circulation Pump");

        // Accumulator (pressure reservoir)
        const accumGeo = new THREE.SphereGeometry(0.05, 12, 12);
        const accum = new THREE.Mesh(accumGeo, new THREE.MeshStandardMaterial({color:0xccaa44,metalness:0.5,roughness:0.4}));
        accum.position.set(0.08, pumpY, 0.06);
        addPart(accum,"structure","Fluid Accumulator");

        // Power distribution bus bars (vertical copper strips on sides)
        for (const bside of [-1,1]) {
            const busbar = new THREE.Mesh(box(0.015, spineH*0.8, 0.06),
                new THREE.MeshStandardMaterial({color:0xcc8833,metalness:0.8,roughness:0.2}));
            busbar.position.set(bside*bayW/2*0.85, bayY, 0);
            stationGroup.add(busbar);
        }

        // Harness bundles (cable runs top to bottom)
        for (const hz of [-0.15, 0.15]) {
            const harness = new THREE.Mesh(box(0.025, spineH*0.7, 0.025), MAT.pipe);
            harness.position.set(-bayW/2*0.6, bayY, hz);
            stationGroup.add(harness);
        }

        // Interface plate to radiator (bottom flange)
        const flange = new THREE.Mesh(box(bayW*0.8, 0.015, bayW*0.6),
            new THREE.MeshStandardMaterial({color:0x889999,metalness:0.6,roughness:0.3}));
        flange.position.set(0, bayY - bayH/2 - 0.01, 0);
        addPart(flange,"structure","Radiator Interface Plate");

        // ── EXTERNAL FLUID TRANSPORT LINES ──
        // Visible thermal loop plumbing from compute bay down to radiator panel
        // Hot supply (red) and cold return (blue) run from bay bottom to radiator top
        // These are the main visible thermal loops the user should see
        const radYPos = -(hubY / 2 + radH / 2 + radGap);
        const bayBottom = bayY - bayH/2;
        const radTop = radYPos + radH/2;
        const pipeRunLen = Math.max(0.5, Math.abs(bayBottom - radTop) + radH * 0.6);
        const pipeMidY = bayBottom - pipeRunLen / 2;

        // Hot supply line (red/orange — carries warm coolant from compute bay to radiator)
        const hotPipeMat = new THREE.MeshStandardMaterial({color:0xee4422, metalness:0.5, roughness:0.3, emissive:0xcc3311, emissiveIntensity:0.25});
        const hotPipe = new THREE.Mesh(new THREE.CylinderGeometry(0.035, 0.035, pipeRunLen, 8), hotPipeMat);
        hotPipe.position.set(-0.18, pipeMidY, 0.08);
        addPart(hotPipe, "structure", "Hot Fluid Supply Line (PAO-2) — GPU heat → radiator");

        // Cold return line (blue — carries chilled coolant back from radiator to compute bay)
        const coldPipeMat = new THREE.MeshStandardMaterial({color:0x2255cc, metalness:0.5, roughness:0.3, emissive:0x1144bb, emissiveIntensity:0.25});
        const coldPipe = new THREE.Mesh(new THREE.CylinderGeometry(0.035, 0.035, pipeRunLen, 8), coldPipeMat);
        coldPipe.position.set(0.18, pipeMidY, 0.08);
        addPart(coldPipe, "structure", "Cold Fluid Return Line (PAO-2) — radiator → GPU cold plates");

        // Second pair of pipes on other side (redundant loop)
        const hotPipe2 = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, pipeRunLen, 8), hotPipeMat);
        hotPipe2.position.set(-0.18, pipeMidY, -0.08);
        addPart(hotPipe2, "structure", "Hot Supply Line B (redundant loop)");

        const coldPipe2 = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, pipeRunLen, 8), coldPipeMat);
        coldPipe2.position.set(0.18, pipeMidY, -0.08);
        addPart(coldPipe2, "structure", "Cold Return Line B (redundant loop)");

        // MLI insulation wrap around all pipes (gold/amber, semi-transparent)
        for (const [px, pz] of [[-0.18, 0.08], [0.18, 0.08], [-0.18, -0.08], [0.18, -0.08]]) {
            const mli = new THREE.Mesh(new THREE.CylinderGeometry(0.045, 0.045, pipeRunLen * 0.92, 8),
                new THREE.MeshStandardMaterial({color:0xe0c020, metalness:0.6, roughness:0.4, transparent:true, opacity:0.2}));
            mli.position.set(px, pipeMidY, pz);
            stationGroup.add(mli);
        }

        // Header manifold at radiator interface (where pipes connect to radiator channels)
        const headerMat = new THREE.MeshStandardMaterial({color:0x778899, metalness:0.6, roughness:0.3});
        const header = new THREE.Mesh(box(0.6, 0.06, 0.15), headerMat);
        header.position.set(0, radTop + 0.05, 0.08);
        addPart(header, "structure", "Radiator Header Manifold — hot/cold distribution");

        const header2 = new THREE.Mesh(box(0.6, 0.06, 0.15), headerMat);
        header2.position.set(0, radTop + 0.05, -0.08);
        addPart(header2, "structure", "Radiator Header Manifold B (redundant)");
    }
    // Laser terminals
    for (let i=0;i<4;i++) {
        const a=i*Math.PI/2;
        const lt=new THREE.Mesh(new THREE.CylinderGeometry(0.15,0.15,0.4,8),MAT.antenna);
        lt.position.set(Math.cos(a)*0.8,0,Math.sin(a)*0.8);
        lt.rotation.x=Math.PI/2*Math.cos(a); lt.rotation.z=Math.PI/2*Math.sin(a);
        addPart(lt,"dragonfly_link","ISL Terminal "+(i+1));
    }

    // Scale reference: Starlink V2 mini (7m x 3.5m)
    const refGroupDP2 = new THREE.Group();
    const refBodyDP2 = new THREE.Mesh(box(1.3, 0.05, 0.8), new THREE.MeshStandardMaterial({color: 0xff8800, transparent: true, opacity: 0.5}));
    const refPanel1DP2 = new THREE.Mesh(box(3.5, 0.01, 1.7), new THREE.MeshStandardMaterial({color: 0xff8800, transparent: true, opacity: 0.3}));
    refPanel1DP2.position.set(2.4, 0, 0);
    const refPanel2DP2 = refPanel1DP2.clone();
    refPanel2DP2.position.set(-2.4, 0, 0);
    refGroupDP2.add(refBodyDP2, refPanel1DP2, refPanel2DP2);
    const bboxDP2 = new THREE.Box3().setFromObject(stationGroup);
    const bsizeDP2 = bboxDP2.getSize(new THREE.Vector3());
    refGroupDP2.position.set(-bsizeDP2.x * 0.4, bboxDP2.min.y - 3, bsizeDP2.z * 0.3);
    refGroupDP2.userData = { partType: 'scale_ref', label: 'Starlink V2 mini (7m \u00d7 3.5m) \u2014 scale reference' };
    stationGroup.add(refGroupDP2);
    const slLabelDP2 = 'Starlink V2 mini (7m \u00d7 3.5m) \u2014 scale reference';
    partRegistry.push({mesh: refBodyDP2, partType: 'scale_ref', label: slLabelDP2, originalMaterial: refBodyDP2.material});
    partRegistry.push({mesh: refPanel1DP2, partType: 'scale_ref', label: slLabelDP2, originalMaterial: refPanel1DP2.material});
    partRegistry.push({mesh: refPanel2DP2, partType: 'scale_ref', label: slLabelDP2, originalMaterial: refPanel2DP2.material});
}


function buildDP3(cfg) {
    // ================================================================
    // DP3 — FLAT BUS + T-SHAPE RADIATOR (same architecture as DP2)
    // No spine. Scaled-up flat bus with skinny roll-out solar wings
    // and a tall narrow radiator hanging straight down (T-shape).
    // DP3 photonic adds a cryo section below the radiator.
    // DP3B electrical is just a bigger DP2.
    // ================================================================

    const hubX = 3.0, hubY = 2.0, hubZ = 1.5;
    const hub = new THREE.Mesh(box(hubX, hubY, hubZ), MAT.hub);
    addPart(hub, "hub", "Spacecraft Bus");
    const pmad = new THREE.Mesh(box(hubX*0.7, hubY*0.6, hubZ*0.3), MAT.gold);
    pmad.position.set(0, 0, hubZ/2 + hubZ*0.15);
    addPart(pmad, "hub", "PMAD + Power Distribution");
    const ant = new THREE.Mesh(new THREE.CylinderGeometry(0.8, 0.8, 0.2, 16), MAT.antenna);
    ant.rotation.z = Math.PI/2;
    ant.position.set(hubX/2 + 0.15, 0, 0);
    addPart(ant, "hub", "Ground Antenna Array");

    // ── SKINNY ROLL-OUT SOLAR WINGS ±X ──
    const pvC = 5;
    const pvS = Math.ceil(cfg.solarM2 / 2 / pvC);
    const pvY = hubY/2 + 0.02;

    for (const s of [1, -1]) {
        const f = new THREE.Mesh(box(pvS, 0.02, pvC), MAT.pv);
        f.position.set(s * pvS/2, pvY + 0.015, 0);
        addPart(f, "pv_wing", `PV ${s>0?'+':'-'}X`);
        const b = new THREE.Mesh(box(pvS, 0.02, pvC), MAT.pvBack);
        b.position.set(s * pvS/2, pvY - 0.015, 0);
        addPart(b, "pv_wing", `PV Back ${s>0?'+':'-'}X`);
        for (let x = 4; x < pvS; x += 4) {
            const sm = new THREE.Mesh(box(0.03, 0.015, pvC), MAT.seam);
            sm.position.set(s * x, pvY + 0.015, 0);
            stationGroup.add(sm);
        }
    }
    buildWingStructure([0, pvY, 0], pvS, pvC, [1,0,0], [0,0,1], [0,1,0]);
    buildWingStructure([0, pvY, 0], pvS, pvC, [-1,0,0], [0,0,1], [0,1,0]);

    // Deployment hinges
    for (const s of [1, -1]) {
        const hinge = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 0.15, 12), MAT.pipe);
        hinge.position.set(s * hubX/2, pvY, 0);
        hinge.rotation.z = Math.PI/2;
        addPart(hinge, "structure", "PV Deployment Hinge");
    }

    // ── T-SHAPE RADIATOR — tall narrow panel hanging straight down ──
    const radArea = cfg.radM2;
    const radAspect3 = 1/6;
    const radLen3 = Math.sqrt(radArea * radAspect3);
    const radH3 = radArea / radLen3;
    const radThick = 0.03;
    const radGap3 = 0.3;

    const radY3 = -(hubY/2 + radH3/2 + radGap3);

    const hpMat3 = new THREE.MeshStandardMaterial({color: 0xd0d0dd, roughness: 0.35, metalness: 0.4});
    const frameMat3 = new THREE.MeshStandardMaterial({color: 0xaaaabc, roughness: 0.4, metalness: 0.5});

    // Hinge
    const hinge3 = new THREE.Mesh(box(radLen3*0.5, 0.08, 0.06), MAT.truss);
    hinge3.position.set(0, -(hubY/2+0.04), 0);
    stationGroup.add(hinge3);

    // Main radiator panel (XY plane, normal ±Z, centered for T-shape)
    const radPanel3 = new THREE.Mesh(box(radLen3, radH3, radThick), MAT.rad);
    radPanel3.position.set(0, radY3, 0);
    addPart(radPanel3, "radiator", `Radiator — ${radArea.toFixed(0)}m² (${radLen3.toFixed(1)}m × ${radH3.toFixed(1)}m)`);

    // Heat pipes
    for (let hp = 0; hp < 6; hp++) {
        const hpX = -radLen3/2 + radLen3*(hp+1)/7;
        const hpMesh = new THREE.Mesh(box(0.012, radH3*0.9, radThick+0.004), hpMat3);
        hpMesh.position.set(hpX, radY3, 0);
        stationGroup.add(hpMesh);
    }

    // Edge frame
    for (const [fw, fh, fx2, fy2] of [
        [radLen3+0.04, 0.03, 0, radH3/2],
        [radLen3+0.04, 0.03, 0, -radH3/2],
        [0.03, radH3, radLen3/2, 0],
        [0.03, radH3, -radLen3/2, 0],
    ]) {
        const fr = new THREE.Mesh(box(fw, fh, radThick+0.008), frameMat3);
        fr.position.set(fx2, radY3+fy2, 0);
        stationGroup.add(fr);
    }

    // Fold seams
    for (let f = 1; f <= 5; f++) {
        const foldY = -radH3/2 + radH3*f/6;
        const foldLine = new THREE.Mesh(box(radLen3*0.95, 0.012, radThick+0.005), MAT.seam);
        foldLine.position.set(0, radY3+foldY, 0);
        stationGroup.add(foldLine);
    }

    // ORUs on -Z face (anti-sun)
    const oc3 = Math.min(300, Math.floor(cfg.computeKw * 1000 / cfg.gpuPowerW));
    const [ow3, oh3, od3] = cfg.oruSize;
    const finCols3 = Math.max(1, Math.floor(Math.sqrt(oc3 / 6)));
    const finRows3 = Math.max(1, Math.floor(oc3 / finCols3));
    const sw3 = radLen3 / (finCols3+1), sh3 = radH3 / (finRows3+1);
    for (let c = 0; c < finCols3; c++) for (let r = 0; r < finRows3; r++) {
        const oruIdx = c * finRows3 + r;
        if (oruIdx >= oc3) break;
        const role = getORURole(oruIdx, cfg.oruPrimaryRole || (cfg.isPhotonic ? 'prefill' : 'decode'));
        const ox = -radLen3/2 + sw3*(c+1);
        const oy = -radH3/2 + sh3*(r+1);
        const oru = new THREE.Mesh(box(ow3, oh3, od3), role.mat);
        oru.position.set(ox, radY3+oy, -(radThick/2+od3/2));
        const lbl = `ORU [${c},${r}] — ${role.label}`;
        if (c===0 && r===0) addPart(oru,"oru",lbl);
        else { oru.userData={partType:"oru",label:lbl}; stationGroup.add(oru); partRegistry.push({mesh:oru,partType:"oru",label:lbl,originalMaterial:oru.material}); }
    }

    // ── CRYOGENIC SECTION (photonic only) ──
    if (cfg.isPhotonic) {
        const cryoMat = new THREE.MeshStandardMaterial({color:0x88ccff,emissive:0x2266aa,emissiveIntensity:0.2,metalness:0.3,roughness:0.4});
        const mliMat = new THREE.MeshStandardMaterial({color:0xd4af37,metalness:0.3,roughness:0.6,transparent:true,opacity:0.35,side:THREE.DoubleSide});
        const waveguideMat = new THREE.MeshStandardMaterial({color:0x00ff88,emissive:0x00ff88,emissiveIntensity:0.4,transparent:true,opacity:0.6});
        const snspMat = new THREE.MeshStandardMaterial({color:0xff4488,emissive:0xff2266,emissiveIntensity:0.3});
        const copperMat = new THREE.MeshStandardMaterial({color:0xb87333,metalness:0.8,roughness:0.3,emissive:0xb87333,emissiveIntensity:0.08});

        const cryoTopY = radY3 - radH3/2 - 1;

        // Cryocooler
        const crMach = new THREE.Mesh(box(2.5, 3, 2.5), MAT.pipe);
        crMach.position.set(0, cryoTopY-1.5, 0);
        addPart(crMach, "cryo_section", "Cryocooler (300K→77K→4K)");

        for (let i = 0; i < 4; i++) {
            const cyl = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 1.5, 12), MAT.pipe);
            cyl.position.set(-0.75+i*0.5, cryoTopY-1.5, 0);
            cyl.rotation.x = Math.PI/2;
            addPart(cyl, "cryo_section", `PT Compressor ${i+1}`);
        }

        // He-4 transfer lines
        const coldY = cryoTopY - 6;
        for (const gz of [-0.7, 0.7]) {
            const heLine = new THREE.Mesh(box(0.05, 5, 0.05), copperMat);
            heLine.position.set(gz, (cryoTopY-3+coldY)/2, 0);
            addPart(heLine, "cryo_section", "He-4 Transfer Line");
        }

        // 4K Cold Section
        const coldMLI = new THREE.Mesh(box(1.5, 8, 1.5), mliMat);
        coldMLI.position.set(0, coldY, 0);
        addPart(coldMLI, "cryo_section", "4K Cold Section (MLI)");

        const cryostatGeo = new THREE.CylinderGeometry(0.65, 0.65, 7.5, 16, 1, true);
        const cryostatMat2 = new THREE.MeshStandardMaterial({color:0xaaccee,metalness:0.4,roughness:0.2,transparent:true,opacity:0.15,side:THREE.DoubleSide});
        const cryostat = new THREE.Mesh(cryostatGeo, cryostatMat2);
        cryostat.position.set(0, coldY, 0);
        addPart(cryostat, "cryo_section", "4K Vacuum Cryostat");

        // 3 Photonic IC modules
        for (let ci = 0; ci < 3; ci++) {
            const cmY = coldY - 2.5 + ci*2.5;
            const pic = new THREE.Mesh(box(1.6, 0.8, 1.6),
                new THREE.MeshStandardMaterial({color:0x1a1a3a,metalness:0.6,roughness:0.2,emissive:0x0a0a2a,emissiveIntensity:0.2}));
            pic.position.set(0, cmY, 0);
            addPart(pic, "oru", `Photonic IC ${ci+1} (Si₃N₄)`);
            for (const side of [-1,1]) {
                const snspd = new THREE.Mesh(box(0.25, 0.6, 1.0), snspMat);
                snspd.position.set(side*1.1, cmY, 0);
                addPart(snspd, "oru", `SNSPD ${ci+1}${side>0?'R':'L'}`);
            }
            if (ci < 2) {
                const wg = new THREE.Mesh(box(0.03, 2.0, 0.03), waveguideMat);
                wg.position.set(0, cmY+1.2, 0);
                stationGroup.add(wg);
            }
        }

        // 77K Cryo radiator
        const cryoRadY = coldY - 5;
        const cryoRad = new THREE.Mesh(box(2.0, 0.015, 2.0), cryoMat);
        cryoRad.position.set(0, cryoRadY, 0);
        addPart(cryoRad, "cryo_radiator", "Cryo Radiator (77K)");
    }

    // ── ISL LASER TERMINALS ──
    for (let i = 0; i < cfg.islCount; i++) {
        const a = i * 2 * Math.PI / cfg.islCount;
        const lt = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.15, 0.4, 8), MAT.antenna);
        lt.position.set(Math.cos(a)*1.2, hubY/2+0.2, Math.sin(a)*1.0);
        addPart(lt, "dragonfly_link", "ISL Terminal "+(i+1));
    }

    // Scale reference
    const refGroupDP3 = new THREE.Group();
    const refBodyDP3 = new THREE.Mesh(box(1.3, 0.05, 0.8), new THREE.MeshStandardMaterial({color: 0xff8800, transparent: true, opacity: 0.5}));
    const refPanel1DP3 = new THREE.Mesh(box(3.5, 0.01, 1.7), new THREE.MeshStandardMaterial({color: 0xff8800, transparent: true, opacity: 0.3}));
    refPanel1DP3.position.set(2.4, 0, 0);
    const refPanel2DP3 = refPanel1DP3.clone();
    refPanel2DP3.position.set(-2.4, 0, 0);
    refGroupDP3.add(refBodyDP3, refPanel1DP3, refPanel2DP3);
    const bboxDP3 = new THREE.Box3().setFromObject(stationGroup);
    refGroupDP3.position.set(-pvS*0.3, bboxDP3.min.y - 5, pvC*0.8);
    refGroupDP3.userData = { partType: 'scale_ref', label: 'Starlink V2 mini (7m × 3.5m) — scale reference' };
    stationGroup.add(refGroupDP3);
    const slLabelDP3 = 'Starlink V2 mini (7m × 3.5m) — scale reference';
    partRegistry.push({mesh: refBodyDP3, partType: 'scale_ref', label: slLabelDP3, originalMaterial: refBodyDP3.material});
    partRegistry.push({mesh: refPanel1DP3, partType: 'scale_ref', label: slLabelDP3, originalMaterial: refPanel1DP3.material});
    partRegistry.push({mesh: refPanel2DP3, partType: 'scale_ref', label: slLabelDP3, originalMaterial: refPanel2DP3.material});
}

function buildDragonfly(cfgKey) {
    const baseCfg = CONFIGS[cfgKey.replace('_DRAGONFLY','')];
    const nodeCount = baseCfg.clusterSize || 4;
    const edgeCount = nodeCount - 1;
    // Size the cluster radius based on actual panel wingspan to prevent overlap
    const dfPvC = baseCfg.isPhotonic ? 5 : 3.5;
    const dfPvS = Math.ceil(baseCfg.solarM2 / 2 / dfPvC);
    const dfWingspan = dfPvS * 2 + 5;
    const clusterR = dfWingspan * 1.1;

    // ================================================================
    // DRAGONFLY TOPOLOGY (Kim, Dally, Abts 2008) — ring-of-groups layout
    //
    // Groups arranged in a ring. Each group is a small cluster of nodes.
    // Center router node sits at the origin with hub links to each group.
    //
    // DP2 (5 nodes): 1 center + 2 groups of 2
    // DP3 (10 nodes): 1 center + 3 groups of 3
    //
    // Role assignment per group:
    //   Center: ROUTING — scheduler, load balancer, ground antenna
    //   Group 1: PREFILL-biased — compute-heavy prompt processing
    //   Group 2: DECODE-biased — memory-BW-heavy token generation
    //   Group 3: CONTEXT-biased — KV cache storage & serving
    // ================================================================
    const groupSize = baseCfg.isDP3 ? 3 : 2;
    const numGroups = Math.ceil(edgeCount / groupSize);

    const groupRoles = ['prefill', 'decode', 'context', 'prefill', 'decode'];
    const groupRoleLabels = ['PREFILL', 'DECODE', 'CONTEXT', 'PREFILL-2', 'DECODE-2'];

    const groups = [];
    for (let g = 0; g < numGroups; g++) {
        const grp = [];
        for (let i = 0; i < groupSize && g * groupSize + i < edgeCount; i++) {
            grp.push(g * groupSize + i + 1);
        }
        groups.push(grp);
    }

    const positions = [[0, 0, 0]];
    const nodeRoles = ['routing'];
    const nodeGroupIdx = [-1];
    const groupSpread = dfWingspan * 0.5;  // nodes within a group spaced at half wingspan

    for (let g = 0; g < numGroups; g++) {
        const groupAngle = (2 * Math.PI * g) / numGroups;
        const groupCenterX = clusterR * Math.cos(groupAngle);
        const groupCenterZ = clusterR * Math.sin(groupAngle);

        for (let i = 0; i < groups[g].length; i++) {
            const perpAngle = groupAngle + Math.PI / 2;
            const offset = (i - (groups[g].length - 1) / 2) * groupSpread;
            const x = groupCenterX + Math.cos(perpAngle) * offset;
            const z = groupCenterZ + Math.sin(perpAngle) * offset;
            const y = (i - 1) * (baseCfg.isDP3 ? 15 : 5);

            positions.push([x, y, z]);
            nodeRoles.push(groupRoles[g % groupRoles.length]);
            nodeGroupIdx.push(g);
        }
    }

    const saved = stationGroup;
    for (let n = 0; n < positions.length; n++) {
        const [x, y, z] = positions[n];
        const role = nodeRoles[n];
        const isCenter = (n === 0);
        const gIdx = nodeGroupIdx[n];
        const groupLabel = isCenter ? 'CENTER (Router)' : `Group ${gIdx + 1} — ${groupRoleLabels[gIdx % groupRoleLabels.length]}`;

        const group = new THREE.Group();
        group.position.set(x, y, z);
        group.userData = {
            partType: "cluster_node",
            label: `Node ${n + 1} — ${groupLabel}`,
            clusterRole: role,
            nodeIndex: n,
            groupIndex: gIdx
        };
        stationGroup = group;

        const nodeCfg = { ...baseCfg, oruPrimaryRole: role };
        // Route to correct builder: only DP3 photonic uses spine, everything else is flat-bus
        if (baseCfg.isPhotonic) buildDP3(nodeCfg);
        else if (nodeCfg.isDP1B) buildDP1B(nodeCfg);
        else if (nodeCfg.isHexpack) buildT1(nodeCfg);
        else if (nodeCfg.isDP1) buildDP1(nodeCfg);
        else buildDP2(nodeCfg);
        saved.add(group);
    }
    stationGroup = saved;

    // ISL links
    const linkR = baseCfg.isDP3 || baseCfg.solarM2 > 2000 ? 1.5 : 0.5;
    const intraLinkMat = new THREE.MeshStandardMaterial({
        color: 0x00ffcc, transparent: true, opacity: 0.5,
        emissive: 0x00ffcc, emissiveIntensity: 0.3
    });
    const globalLinkMat = new THREE.MeshStandardMaterial({
        color: 0xff8800, transparent: true, opacity: 0.45,
        emissive: 0xff6600, emissiveIntensity: 0.3
    });
    const hubLinkMat = new THREE.MeshStandardMaterial({
        color: 0xffcc00, transparent: true, opacity: 0.55,
        emissive: 0xffaa00, emissiveIntensity: 0.35
    });

    function addLink(i, j, mat, r, label) {
        const [x1, y1, z1] = positions[i], [x2, y2, z2] = positions[j];
        const dx = x2 - x1, dy = y2 - y1, dz = z2 - z1;
        const len = Math.sqrt(dx * dx + dy * dy + dz * dz);
        if (len < 0.01) return;
        const geo = new THREE.CylinderGeometry(r, r, len, 6);
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.set((x1 + x2) / 2, (y1 + y2) / 2, (z1 + z2) / 2);
        mesh.lookAt(x2, y2, z2);
        mesh.rotateX(Math.PI / 2);
        addPart(mesh, "dragonfly_link", label);
    }

    // Hub links: center → each group
    for (let g = 0; g < groups.length; g++) {
        addLink(0, groups[g][0], hubLinkMat, linkR,
            `Hub Link: Center ↔ Group ${g + 1} [${groupRoleLabels[g % groupRoleLabels.length]}]`);
    }

    // Intra-group: full mesh within each group
    for (let g = 0; g < groups.length; g++) {
        const grp = groups[g];
        for (let a = 0; a < grp.length; a++) {
            for (let b = a + 1; b < grp.length; b++) {
                addLink(grp[a], grp[b], intraLinkMat, linkR * 0.6,
                    `Intra-Group ${g + 1}: Node ${grp[a] + 1} ↔ Node ${grp[b] + 1}`);
            }
        }
    }

    // Global links: one link between each pair of groups
    for (let ga = 0; ga < groups.length; ga++) {
        for (let gb = ga + 1; gb < groups.length; gb++) {
            const k = (ga + gb) % Math.min(groups[ga].length, groups[gb].length);
            const nodeA = groups[ga][Math.min(k, groups[ga].length - 1)];
            const nodeB = groups[gb][Math.min(k, groups[gb].length - 1)];
            addLink(nodeA, nodeB, globalLinkMat, linkR * 0.45,
                `Global Link: Group ${ga + 1} ↔ Group ${gb + 1}`);
        }
    }

    // Group boundary rings
    const ringMat = new THREE.MeshStandardMaterial({
        color: 0x334455, transparent: true, opacity: 0.08,
        emissive: 0x112233, emissiveIntensity: 0.1, side: THREE.DoubleSide
    });
    for (let g = 0; g < numGroups; g++) {
        const groupAngle = (2 * Math.PI * g) / numGroups;
        const cx = clusterR * Math.cos(groupAngle);
        const cz = clusterR * Math.sin(groupAngle);
        const ringR = groupSpread * (groups[g].length) * 0.8;
        const ringGeo = new THREE.RingGeometry(ringR * 0.3, ringR, 24);
        const ring = new THREE.Mesh(ringGeo, ringMat);
        ring.position.set(cx, -2, cz);
        ring.rotation.x = -Math.PI / 2;
        stationGroup.add(ring);
    }
}

function buildCluster(cfgKey) {
    const baseCfg = CONFIGS[cfgKey.replace('_CLUSTER','')];
    const nodeCount = baseCfg.clusterSize || 4;
    // Calculate spacing from actual panel wingspan so nodes never overlap
    // DP2: pvC=3.5, pvS = solarM2/2/pvC ≈ 103m per side → total wingspan ~210m
    // Skinny roll-out panels: DP3 uses 5m chord, everything else 3.5m
    const pvC = baseCfg.isPhotonic ? 5 : 3.5;
    const pvS = Math.ceil(baseCfg.solarM2 / 2 / pvC);
    const wingspan = pvS * 2 + 5;  // total wingspan + margin
    const hexR = wingspan * 1.1;  // nodes spaced wider than wingspan to prevent overlap

    // ================================================================
    // HEX-CELL BRANCHING TOPOLOGY
    //
    // Each node ("hex-cell") is a self-contained unit: own solar, compute,
    // radiator. The cluster grows by budding new cells off primary nodes.
    //
    // Layout matches the sticky note sketch:
    //   - 2 redundant PRIMARY nodes at center (fault tolerance)
    //   - Edge nodes branch outward from the primaries
    //   - Each hex-cell is identical hardware, differentiated by role
    //   - Branching pattern ≈ crystal growth / organic topology
    //
    // DP2 (5 nodes): 2 primary + 3 edge (branching off)
    // DP3 (10 nodes): 2 primary + 8 edge (deeper branching)
    //
    // Dragonfly wiring overlaid on physical hex-cell positions:
    //   - Intra-branch: full mesh within branch (cyan)
    //   - Cross-branch: sparse global links (orange)
    //   - Primary spine: thick link between 2 primaries (gold)
    //
    // Role assignment:
    //   Primary 1: ROUTING + PREFILL (handles ingress, prompt processing)
    //   Primary 2: ROUTING + DECODE (handles egress, token generation)
    //   Edge cells: specialized by branch (prefill / decode / context / KV-cache)
    // ================================================================

    // Branching positions — organic layout like the sticky note sketch
    // Two primaries offset from center, edges branch outward
    const positions = [];
    const nodeRoles = [];
    const nodeGroupIdx = [];  // which branch
    const nodePrimary = [];   // is this a primary node?

    const spacing = hexR;
    const primaryGap = spacing * 0.6;

    // Primary nodes — 2 redundant cores offset from center
    positions.push([-primaryGap/2, 0, 0]);  // Primary 1 (left)
    nodeRoles.push('routing');
    nodeGroupIdx.push(-1);
    nodePrimary.push(true);

    positions.push([primaryGap/2, 0, 0]);   // Primary 2 (right)
    nodeRoles.push('routing');
    nodeGroupIdx.push(-1);
    nodePrimary.push(true);

    // Edge nodes branch outward from the primaries in an organic pattern
    // Branching angles and distances create the sticky-note crystal growth look
    const edgeCount = nodeCount - 2;
    const branchRoles = ['prefill', 'decode', 'context', 'KV-cache-server', 'prefill', 'decode', 'context', 'scheduler'];
    const branchLabels = ['PREFILL', 'DECODE', 'CONTEXT', 'KV-CACHE', 'PREFILL-2', 'DECODE-2', 'CONTEXT-2', 'SCHEDULER'];

    if (baseCfg.isDP3) {
        // DP3: 10 nodes → 2 primary + 8 edge in branching pattern
        // Branch off primary 1 (left side) — 4 nodes
        const b1 = [
            { angle: Math.PI * 0.75,  dist: 1.0, parent: 0 },  // upper-left
            { angle: Math.PI * 1.1,   dist: 1.0, parent: 0 },  // lower-left
            { angle: Math.PI * 0.85,  dist: 1.9, parent: 0 },  // far upper-left (branches off first)
            { angle: Math.PI * 1.2,   dist: 1.8, parent: 0 },  // far lower-left
        ];
        // Branch off primary 2 (right side) — 4 nodes
        const b2 = [
            { angle: -Math.PI * 0.15, dist: 1.0, parent: 1 },  // upper-right
            { angle: -Math.PI * 0.45, dist: 1.0, parent: 1 },  // mid-right
            { angle: Math.PI * 0.1,   dist: 1.8, parent: 1 },  // far upper-right
            { angle: -Math.PI * 0.55, dist: 1.7, parent: 1 },  // far lower-right
        ];
        const branches = [...b1, ...b2];
        for (let i = 0; i < branches.length; i++) {
            const b = branches[i];
            const parentPos = positions[b.parent];
            const x = parentPos[0] + Math.cos(b.angle) * spacing * b.dist;
            const z = parentPos[2] + Math.sin(b.angle) * spacing * b.dist;
            const y = (Math.random() - 0.5) * 20;  // slight Y scatter for depth
            positions.push([x, y, z]);
            nodeRoles.push(branchRoles[i % branchRoles.length]);
            nodeGroupIdx.push(i < 4 ? 0 : 1);  // branch 0 = left primary, branch 1 = right primary
            nodePrimary.push(false);
        }
    } else {
        // DP2: 5 nodes → 2 primary + 3 edge
        const branches = [
            { angle: Math.PI * 0.8,  dist: 1.0, parent: 0 },   // upper-left off primary 1
            { angle: -Math.PI * 0.2, dist: 1.0, parent: 1 },   // upper-right off primary 2
            { angle: -Math.PI * 0.7, dist: 1.1, parent: 1 },   // lower-right off primary 2
        ];
        for (let i = 0; i < branches.length; i++) {
            const b = branches[i];
            const parentPos = positions[b.parent];
            const x = parentPos[0] + Math.cos(b.angle) * spacing * b.dist;
            const z = parentPos[2] + Math.sin(b.angle) * spacing * b.dist;
            positions.push([x, 0, z]);
            nodeRoles.push(branchRoles[i % branchRoles.length]);
            nodeGroupIdx.push(i < 1 ? 0 : 1);
            nodePrimary.push(false);
        }
    }

    // Build station geometry for each node with role-specific ORU colors
    const saved = stationGroup;
    for (let n = 0; n < positions.length; n++) {
        const [x, y, z] = positions[n];
        const role = nodeRoles[n];
        const isPrimary = nodePrimary[n];
        const gIdx = nodeGroupIdx[n];
        const nodeLabel = isPrimary
            ? `Primary ${n + 1} — ROUTING (redundant core)`
            : `Hex-Cell ${n + 1} — ${branchLabels[(n - 2) % branchLabels.length]}`;

        const group = new THREE.Group();
        group.position.set(x, y, z);
        group.userData = {
            partType: "cluster_node",
            label: `Node ${n + 1} — ${nodeLabel}`,
            clusterRole: role,
            nodeIndex: n,
            groupIndex: gIdx,
            isPrimary: isPrimary
        };
        stationGroup = group;

        // Primary nodes get mixed role (routing + compute), edges specialize
        const nodeCfg = { ...baseCfg };
        if (isPrimary) {
            // Primaries: 40% routing, 30% prefill, 20% decode, 10% context
            nodeCfg.oruPrimaryRole = n === 0 ? 'prefill' : 'decode';
        } else {
            nodeCfg.oruPrimaryRole = role;
        }
        // Route to correct builder: only DP3 photonic uses spine
        if (baseCfg.isPhotonic) buildDP3(nodeCfg);
        else if (nodeCfg.isDP1B) buildDP1B(nodeCfg);
        else if (nodeCfg.isHexpack) buildT1(nodeCfg);
        else if (nodeCfg.isDP1) buildDP1(nodeCfg);
        else buildDP2(nodeCfg);
        saved.add(group);
    }
    stationGroup = saved;

    // ── ISL LINK RENDERING ──
    const linkR = baseCfg.isDP3 ? 1.5 : 0.5;
    const spineLinkMat = new THREE.MeshStandardMaterial({
        color: 0xffdd00, transparent: true, opacity: 0.7,
        emissive: 0xffaa00, emissiveIntensity: 0.5
    });
    const branchLinkMat = new THREE.MeshStandardMaterial({
        color: 0x00ffcc, transparent: true, opacity: 0.5,
        emissive: 0x00ffcc, emissiveIntensity: 0.3
    });
    const crossLinkMat = new THREE.MeshStandardMaterial({
        color: 0xff8800, transparent: true, opacity: 0.4,
        emissive: 0xff6600, emissiveIntensity: 0.25
    });

    function addLink(i, j, mat, r, label) {
        const [x1, y1, z1] = positions[i], [x2, y2, z2] = positions[j];
        const dx = x2 - x1, dy = y2 - y1, dz = z2 - z1;
        const len = Math.sqrt(dx * dx + dy * dy + dz * dz);
        if (len < 0.01) return;
        const geo = new THREE.CylinderGeometry(r, r, len, 6);
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.set((x1 + x2) / 2, (y1 + y2) / 2, (z1 + z2) / 2);
        mesh.lookAt(x2, y2, z2);
        mesh.rotateX(Math.PI / 2);
        addPart(mesh, "dragonfly_link", label);
    }

    // 1. Primary spine: thick gold link between the 2 redundant primary nodes
    addLink(0, 1, spineLinkMat, linkR * 1.5, 'Primary Spine: Core 1 ↔ Core 2 (redundant link)');

    // 2. Branch links: each edge node connects to its parent primary (cyan)
    for (let n = 2; n < positions.length; n++) {
        const parentIdx = nodeGroupIdx[n] === 0 ? 0 : 1;
        addLink(parentIdx, n, branchLinkMat, linkR,
            `Branch Link: Primary ${parentIdx + 1} ↔ Hex-Cell ${n + 1} [${branchLabels[(n-2) % branchLabels.length]}]`);
    }

    // 3. Cross-branch links: sparse global links between branches (orange)
    // Connect one node from each branch for inter-branch communication
    const branch0 = [], branch1 = [];
    for (let n = 2; n < positions.length; n++) {
        if (nodeGroupIdx[n] === 0) branch0.push(n);
        else branch1.push(n);
    }
    const crossCount = Math.min(branch0.length, branch1.length, baseCfg.isDP3 ? 3 : 1);
    for (let c = 0; c < crossCount; c++) {
        addLink(branch0[c % branch0.length], branch1[c % branch1.length], crossLinkMat, linkR * 0.5,
            `Cross-Branch Link: Branch A[${c}] ↔ Branch B[${c}]`);
    }

    // 4. Intra-branch mesh: connect neighboring edge nodes within same branch (thin cyan)
    [branch0, branch1].forEach((branch, bi) => {
        for (let a = 0; a < branch.length; a++) {
            for (let b = a + 1; b < branch.length; b++) {
                // Only connect if they're close enough (immediate neighbors in the branch)
                const [xa,,za] = positions[branch[a]], [xb,,zb] = positions[branch[b]];
                const dist = Math.sqrt((xa-xb)**2 + (za-zb)**2);
                if (dist < spacing * 1.5) {
                    addLink(branch[a], branch[b], branchLinkMat, linkR * 0.4,
                        `Intra-Branch ${bi+1}: Cell ${branch[a]+1} ↔ Cell ${branch[b]+1}`);
                }
            }
        }
    });

    // 5. Hex-cell boundary indicators — subtle hexagonal outlines around each node
    const hexOutlineMat = new THREE.MeshStandardMaterial({
        color: 0x445566, transparent: true, opacity: 0.06,
        emissive: 0x223344, emissiveIntensity: 0.08, side: THREE.DoubleSide
    });
    const primaryOutlineMat = new THREE.MeshStandardMaterial({
        color: 0xffcc00, transparent: true, opacity: 0.08,
        emissive: 0x665500, emissiveIntensity: 0.12, side: THREE.DoubleSide
    });
    for (let n = 0; n < positions.length; n++) {
        const [x, y, z] = positions[n];
        const outlineR = (baseCfg.isDP3 ? 80 : 25);
        // Use CircleGeometry with 6 sides for hexagonal outline
        const hexGeo = new THREE.RingGeometry(outlineR * 0.6, outlineR, 6);
        const hex = new THREE.Mesh(hexGeo, nodePrimary[n] ? primaryOutlineMat : hexOutlineMat);
        hex.position.set(x, (y || 0) - 3, z);
        hex.rotation.x = -Math.PI / 2;
        stationGroup.add(hex);
    }
}

let currentConfig = 'DP2';

function switchConfig(key) {
    currentConfig = key;
    // Clear scene
    while(stationGroup.children.length) stationGroup.remove(stationGroup.children[0]);
    partRegistry = [];
    // Build
    if (key.includes('CLUSTER')) {
        buildCluster(key);
    } else if (key.includes('DRAGONFLY')) {
        buildDragonfly(key);
    } else {
        const cfg = CONFIGS[key];
        if (cfg.isDP3) buildDP3(cfg);
        else if (cfg.isDP1B) buildDP1B(cfg);
        else if (cfg.isHexpack) buildT1(cfg);
        else if (cfg.isDP1) buildDP1(cfg);
        else buildDP2(cfg);
    }
    // Update sidebar
    const cfg = CONFIGS[key.replace('_CLUSTER','').replace('_DRAGONFLY','')] || CONFIGS.DP2;
    const m = computeMetrics(cfg);
    updateKPIs(cfg, m);
    document.getElementById('tab-overview').innerHTML = renderOverview(cfg, m);
    document.getElementById('tab-compute').innerHTML = renderCompute(cfg, m);
    document.getElementById('tab-network').innerHTML = renderNetwork(cfg, m);
    document.getElementById('tab-models').innerHTML = renderModels(cfg, m);
    document.getElementById('tab-physics').innerHTML = renderPhysics(cfg, m);
    document.getElementById('tab-cluster').innerHTML = renderCluster(cfg, m);
    // Reset camera
    // Auto-frame camera to fit model bounding box
    const bbox = new THREE.Box3().setFromObject(stationGroup);
    const center = bbox.getCenter(new THREE.Vector3());
    const size = bbox.getSize(new THREE.Vector3());
    // Account for canvas aspect ratio — use whichever dimension requires more distance
    const vFov = camera.fov * Math.PI / 180;
    const aspect = camera.aspect || 1;
    const hFov = 2 * Math.atan(Math.tan(vFov/2) * aspect);
    const distV = (size.y / 2) / Math.tan(vFov / 2);
    const distH = (Math.max(size.x, size.z) / 2) / Math.tan(hFov / 2);
    const fitDist = Math.max(distV, distH) * 1.4;
    // 3/4 view from anti-sun side — shows ORU face of radiator
    camera.position.set(center.x + fitDist*0.35, center.y + fitDist*0.45, center.z - fitDist*0.7);
    controls.target.copy(center);
    camera.near = Math.max(0.05, fitDist * 0.002);
    camera.far = fitDist * 20;
    controls.maxDistance = fitDist * 5;
    controls.minDistance = fitDist * 0.02;
    camera.updateProjectionMatrix();
    // Update tabs
    document.querySelectorAll('.config-tab').forEach(b => b.classList.toggle('active', b.dataset.config === key));

    // Update role legend based on config's primary role bias
    const legend = document.getElementById('role-legend');
    if (legend) {
        const cfgL = CONFIGS[key.replace('_CLUSTER','').replace('_DRAGONFLY','')] || CONFIGS.DP2;
        const isPhot = cfgL.isPhotonic;
        const isCentralized = cfgL.centralized;
        const isCluster = key.includes('CLUSTER') || key.includes('DRAGONFLY');
        // Photonic stations are prefill-biased (compute-heavy), electrical are decode-biased (memory-BW)
        const primaryRole = isPhot ? 'PREFILL' : 'DECODE';
        const primaryPct = '60%', secondaryPct = '25%', tertiaryPct = '15%';
        let roles = isPhot ?
            [['#3373e6','PREFILL',primaryPct,'Prompt processing (compute-bound)'],
             ['#e64033','DECODE',secondaryPct,'Token generation (memory-BW)'],
             ['#33bf4d','CONTEXT',tertiaryPct,'KV-cache storage']] :
            [['#e64033','DECODE',primaryPct,'Token generation (memory-BW)'],
             ['#3373e6','PREFILL',secondaryPct,'Prompt processing (compute-bound)'],
             ['#33bf4d','CONTEXT',tertiaryPct,'KV-cache storage']];
        if (isCluster) {
            roles.push(['#ffaa00','ROUTING','primary','Primary hex-cell routing + scheduling']);
        }

        legend.innerHTML = `<div class="legend-title">ORU ROLES ${isCentralized ? '(centralized)' : isCluster ? '(hex-cell — per cell bias)' : ''}</div>` +
            roles.map(([c,n,p,d]) => `<div class="legend-item"><span class="legend-dot" style="background:${c}"></span>${n} <span class="legend-pct" title="${d}">${p}</span></div>`).join('');

        // Hide legend for centralized DP2B (no ORUs on radiator)
        legend.style.display = isCentralized ? 'none' : 'block';
    }
}

const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let hoveredPart = null;

canvas.addEventListener('click', (e) => {
    const rect = canvas.getBoundingClientRect();
    mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
    mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects(stationGroup.children, true);
    if (hits.length > 0) {
        let obj = hits[0].object;
        while (obj && !obj.userData.partType) obj = obj.parent;
        if (obj && obj.userData.partType) {
            // In cluster mode, check if we can find the cluster_node group ancestor
            if (currentConfig.includes('CLUSTER') || currentConfig.includes('DRAGONFLY')) {
                let nodeObj = obj;
                while (nodeObj && nodeObj.userData.partType !== 'cluster_node') nodeObj = nodeObj.parent;
                if (nodeObj && nodeObj.userData.partType === 'cluster_node') {
                    // Show the cluster node info instead
                    showPartInfo('cluster_node', nodeObj.userData.label);
                    return;
                }
            }
            showPartInfo(obj.userData.partType, obj.userData.label);
        }
    }
});

canvas.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
    mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects(stationGroup.children, true);

    if (hoveredPart) {
        const entry = partRegistry.find(p => p.mesh === hoveredPart);
        if (entry) hoveredPart.material = entry.originalMaterial;
        hoveredPart = null;
    }
    if (hits.length > 0) {
        let obj = hits[0].object;
        while (obj && !obj.userData.partType) obj = obj.parent;
        if (obj && obj.userData.partType) {
            hoveredPart = obj;
            obj.material = MAT.highlight;
            canvas.style.cursor = 'pointer';
            return;
        }
    }
    canvas.style.cursor = 'grab';
});
