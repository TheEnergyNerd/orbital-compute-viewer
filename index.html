        ['LCOC Net ($/GPU-hr)', k => '$' + fmt(captures[k].m.lcocNet,2)],
        ['Total GPU-hours (5yr)', k => fmt(captures[k].m.totalGpuHours)],
        ['LCOC note', k => 'Gross = programCost / GPU-hrs. Net = Gross / contactFraction (real-time serving).'],
        ['Mass Solar (kg)', k => fmt(captures[k].cfg.massSolar)],
        ['Mass Radiator (kg)', k => fmt(captures[k].cfg.massRadiator)],
        ['Mass Compute (kg)', k => fmt(captures[k].cfg.massCompute)],
        ['Mass Structure (kg)', k => fmt(captures[k].cfg.massStructure)],
    ];
    for (const [label, fn] of econRows) {
        html += `<tr><td>${label}</td>${singles.map(k => `<td>${fn(k)}</td>`).join('')}</tr>`;
    }
    html += `</table></div>`;

    // Networking comparison
    html += `<h2>Networking Comparison</h2><div class="section"><table class="cmp">
<tr><th>Parameter</th>${colHeaders}</tr>`;
    const netRows = [
        ['ISL Count', k => captures[k].cfg.islCount],
        ['ISL Rate (Gbps)', k => captures[k].cfg.islRateGbps],
        ['Total ISL BW (Gbps)', k => captures[k].cfg.islCount * captures[k].cfg.islRateGbps],
        ['ISL Wavelength', k => captures[k].cfg.islWavelength],
        ['ISL Modulation', k => captures[k].cfg.islModulation],
        ['ISL Aperture (cm)', k => captures[k].cfg.islApertureCm],
        ['ISL Pointing (urad)', k => captures[k].cfg.islPointingUrad],
        ['Ground Link (Gbps)', k => captures[k].cfg.groundLinkGbps],
        ['Ground Stations', k => captures[k].cfg.groundStations],
        ['Contact Fraction', k => fmt(captures[k].cfg.contactFraction,2)],
        ['Hex-Cell Count', k => captures[k].cfg.clusterSize],
        ['Topology', k => captures[k].cfg.clusterTopology],
        ['Tensor Parallel', k => captures[k].cfg.tensorParallel],
        ['Pipeline Parallel', k => captures[k].cfg.pipelineParallel],
    ];
    for (const [label, fn] of netRows) {
        html += `<tr><td>${label}</td>${singles.map(k => `<td>${fn(k)}</td>`).join('')}</tr>`;
    }
    html += `</table></div>`;

    // ═══════ PARTS LIST PER CONFIG ═══════
    html += `<h2>3D Model Parts — All Configs</h2><div class="section"><table class="cmp">
<tr><th>Part Type</th>${allConfigs.map(k => `<th>${k}</th>`).join('')}</tr>`;
    const allPartTypes = new Set();
    allConfigs.forEach(k => Object.keys(captures[k].partGroups).forEach(t => allPartTypes.add(t)));
    const ptNames = {pv_wing:'Solar Arrays',radiator:'Radiators',oru:'ORUs/Compute',spine:'Spine',structure:'Structure',dragonfly_link:'ISL Links',cryo_section:'Cryogenic',cryo_radiator:'Cryo Rad',hub:'Bus/Hub',cluster_node:'Hex-Cells'};
    for (const pt of allPartTypes) {
        html += `<tr><td>${ptNames[pt]||pt}</td>`;
        for (const k of allConfigs) {
            const cnt = captures[k].partGroups[pt] ? captures[k].partGroups[pt].length : 0;
            html += `<td>${cnt || '<span style="color:#333">—</span>'}</td>`;
        }
        html += `</tr>`;
    }
    html += `<tr style="font-weight:bold;border-top:2px solid #7fdbca"><td>TOTAL</td>`;
    for (const k of allConfigs) html += `<td>${captures[k].partCount}</td>`;
    html += `</tr></table></div>`;

    // ═══════ TAB DETAILS PER CONFIG ═══════
    const tabNames = ['Overview','Compute','Network','Models','Physics','Cluster'];
    for (const tabName of tabNames) {
        html += `<h2>${tabName} — All Configs</h2>`;
        // Show each config's tab content in a grid
        html += `<div class="tab-grid">`;
        for (const key of singles) {
            const c = captures[key];
            html += `<div class="tab-box"><h4>${key} — ${c.cfg.name}</h4>${c.tabs[tabName]}</div>`;
        }
        html += `</div>`;
        // Clusters
        html += `<div class="tab-grid">`;
        for (const key of clusters) {
            const c = captures[key];
            html += `<div class="tab-box"><h4>${key}</h4>${c.tabs[tabName]}</div>`;
        }
        html += `</div>`;
    }

    html += `</body></html>`;

    // Render HTML into hidden iframe, then use print-to-PDF
    // Also save as HTML as backup
    const blob = new Blob([html], { type: 'text/html' });
    const htmlUrl = URL.createObjectURL(blob);

    // Open in new window for print-to-PDF
    const win = window.open('', '_blank');
    win.document.write(html);
    win.document.close();

    // Add print button and download button to the opened page
    const toolbar = win.document.createElement('div');
    toolbar.style.cssText = 'position:fixed;top:10px;right:10px;z-index:99999;display:flex;gap:8px';
    toolbar.innerHTML = `
        <button onclick="window.print()" style="padding:8px 16px;background:#7fdbca;color:#0a0e14;border:none;border-radius:4px;cursor:pointer;font-weight:bold;font-size:12px">⬇ Save as PDF (Ctrl+P)</button>
        <a href="${htmlUrl}" download="orbital-compute-debug-${new Date().toISOString().slice(0,10)}.html" style="padding:8px 16px;background:#e8c547;color:#0a0e14;border:none;border-radius:4px;cursor:pointer;font-weight:bold;font-size:12px;text-decoration:none;display:inline-block">⬇ Download HTML</a>
    `;
    win.document.body.appendChild(toolbar);
}

// Add debug button
const debugBtn = document.createElement('button');
debugBtn.textContent = 'Debug Reference';
debugBtn.style.cssText = 'position:fixed;bottom:10px;right:10px;z-index:9999;padding:6px 12px;background:#1a2a1a;color:#7fdbca;border:1px solid #7fdbca;border-radius:4px;font-size:11px;cursor:pointer;font-family:inherit';
debugBtn.addEventListener('click', exportDebugReference);
document.body.appendChild(debugBtn);

</script>
</body>
</html>
